apiVersion: spawnery/v1
kind: App
id: spawnery/github-app
title: GitHub Repo Agent
agents: { support: [any], requiresAcp: [prompt] }
model: { recommendedDefault: anthropic/claude-3.5-sonnet }
storage:
  mounts:
    - name: repo
      path: repo
      durability: node-local   # journaled — a github slot must survive suspend/resume (design §16.7); journaled to the dev Garage when `just garage` creds exist
      github: true             # GitHub SLOT (live-dev D1): the user supplies owner/repo at create (e.g. spawnctl --mount repo=github:owner/repo); the CP auto-resolves the creator's gh: link (E1)
visibility: open
