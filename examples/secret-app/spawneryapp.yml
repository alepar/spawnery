apiVersion: spawnery/v1
kind: App
id: spawnery/secret-app
title: Secret App
agents: { support: [any], requiresAcp: [prompt] }
model: { recommendedDefault: anthropic/claude-3.5-sonnet }
storage:
  mounts:
    - name: main
      path: data
      seed: seed
      durability: node-local   # journaled to the dev Garage when `just garage` creds exist
visibility: open
