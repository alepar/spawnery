syntax = "proto3";
package auth.v1;
option go_package = "spawnery/gen/auth/v1;authv1";

service AuthService {
  // Node -> AS: mint or retrieve the current shared GitHub App user access token for a link.
  // The AS is the sole refresh-chain custodian and rotation authority. The node authenticates with
  // its established node identity; this request carries only a link reference, never a refresh token.
  // repository_id is expected-target audit metadata only and must not be treated as a scope reducer.
  // Implementations use request_id as the idempotency key for retrying an ambiguous refresh attempt.
  rpc MintGitHubAccessToken(MintGitHubAccessTokenRequest) returns (MintGitHubAccessTokenResponse);
}

message GitHubLinkRef {
  string secret_id   = 1; // link/secret identity; AS maps this to its custodial refresh chain.
  uint64 version     = 2; // tuple version delivered to this spawn generation.
  string delivery_id = 3; // delivery identity for idempotency/replay correlation.

  reserved 4;
  reserved "refresh_token";
}

message MintGitHubAccessTokenRequest {
  string        request_id    = 1; // stable idempotency key for this mint attempt.
  string        spawn_id      = 2;
  uint64        generation    = 3;
  GitHubLinkRef link_ref      = 4;
  string        repository_id = 5; // audit/expected target only; not GitHub refresh-time narrowing.
}

message MintGitHubAccessTokenResponse {
  string request_id              = 1; // echoes request_id so retry adopters can match responses.
  string access_token            = 2;
  int64  access_expires_at_unix  = 3;

  reserved 4, 5;
  reserved "refresh_token", "refresh_expires_at_unix";

  string token_type              = 6; // normally "bearer"; preserved for GitHub parity.
  string repository_id           = 7; // echoes audit metadata; access token remains installation-selection-scoped.
  bool   refreshed               = 8; // true when this request rotated the shared link token.
}

// SessionTokenBody is the AS-signed access-token payload (auth-identity design §3).
// wire: base64.RawURLEncoding(body) "." base64.RawURLEncoding(sig)  [MC1]
// sig = ed25519("spawnery/session-token/v1" || body_bytes) — every AS-signed artifact class
// carries a mandatory domain-separation prefix [MC1]. Verifiers check the signature over the
// EXACT received body bytes, then parse.
message SessionTokenBody {
  string account_id = 1;
  string handle = 2; // display-only; nothing keys or authorizes on it [AM9]
  string token_id = 3;
  // "cp" | "node" [MC2] — split: node-relayed tokens are aud=node, REJECTED by the CP
  // interceptor; aud=cp never leaves CP-bound use. A1 mints "cp" only; "node"-audience
  // minting is A4's flow — do not mint node tokens here.
  string audience = 4;
  int64 issued_at = 5;
  int64 expires_at = 6;
  // SHA-256 over the DER SPKI exactly as WebCrypto exportKey('spki') /
  // x509.MarshalPKIXPublicKey emit [AM11].
  bytes session_key_hash = 7;
  string key_id = 8; // AS signing-key selector [AM4]
}

// RevocationEntry is one signed entry in the AS revocation feed (design §4 [AM10]); the CP
// polls GET /revocations?since= and consumes these (A2).
// sig = ed25519("spawnery/revocation/v1" || body_bytes), same key/key_id discipline as
// session tokens.
message RevocationEntry {
  int64 seq = 1;
  string account_id = 2;
  string family_id = 3;
  repeated string token_ids = 4; // access-token token_ids the family had live at revocation
  int64 revoked_at = 5;
}

// MountRef is one mount binding inside an IntentBody. Structurally mirrors node.v1.MountBinding but
// is defined here to keep auth.v1 leaf (no cross-package import).
message MountRef {
  string name                 = 1;
  string backend_uri          = 2;
  string credential_secret_id = 3;
  bool   create_if_missing    = 4;
  string repository_id        = 5;
}

// IntentBody is the signed-intent payload (auth-identity design §5 [AC1][AM11]).
// Clients marshal this, sign domain || body_bytes with their session P-256 key, and embed
// the raw bytes verbatim in SignedIntent.body. Nodes verify the signature over the EXACT
// received body bytes — never re-marshalled (WM9 discipline). The op field mirrors the
// domain suffix so a body cannot be replayed under a different domain even if a verifier
// mis-wires the domain string. Only the fields relevant to the op are populated; the node's
// correspondence check compares exactly the fields it is about to execute.
//
// Domain tags: spawnery/intent/<op>/v1 for op ∈ {create-spawn, resume-spawn,
// recreate-spawn, migrate-spawn, session-open}.
message IntentBody {
  string jti            = 1;  // unique intent id (UUID); node caches to detect replay
  int64  issued_at      = 2;  // unix seconds; node enforces freshness window ±skew
  string spawn_id       = 3;
  uint64 generation     = 4;  // CP-committed episode generation
  string target_node_id = 5;  // explicit target binding; node refuses if != self
  string op             = 6;  // mirrors domain suffix (e.g. "create-spawn")
  string app_ref        = 7;  // create: immutable app ref
  string image          = 8;  // create: agent container image digest/ref
  string model          = 9;  // create: model
  string data_ref       = 10; // resume/recreate/migrate: mount data reference
  string session_id     = 11; // session-open: session being opened
  repeated MountRef mounts = 12; // create/resume: mount bindings
}

// SignedIntent carries a client-signed per-operation intent [AC1][AM11].
// sig = ECDSA P-256 over SHA-256(domain || body), P1363 raw 64-byte r||s (WebCrypto-native).
// spki_der is the full DER SPKI of the client's session key (the node needs the key, not
// just the cnf hash [AM11]).
message SignedIntent {
  string domain   = 1; // "spawnery/intent/<op>/v1"
  bytes  body     = 2; // EXACT proto.Marshal(IntentBody) bytes; never re-marshalled
  bytes  sig      = 3; // P1363 r||s, 64 bytes
  bytes  spki_der = 4; // full DER SPKI of the client session key [AM11]
}

// AuthEnvelope bundles the node-audience access token and the client's SignedIntent for
// relay to the node via StartSpawn / SessionOpen [AC1].
message AuthEnvelope {
  string      access_token = 1; // AS-signed aud=node token [MC2]
  SignedIntent intent       = 2;
}
