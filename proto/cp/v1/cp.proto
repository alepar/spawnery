syntax = "proto3";
package cp.v1;
option go_package = "spawnery/gen/cp/v1;cpv1";

import "auth/v1/auth.proto";

service SpawnService {
  rpc CreateSpawn(CreateSpawnRequest) returns (CreateSpawnResponse);
  rpc ListSpawns(ListSpawnsRequest) returns (ListSpawnsResponse);
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);
  rpc ListAgentImages(ListAgentImagesRequest) returns (ListAgentImagesResponse);
  rpc GetApp(GetAppRequest) returns (GetAppResponse);
  rpc RegisterAppVersion(RegisterAppVersionRequest) returns (RegisterAppVersionResponse);
  rpc SetAppListing(SetAppListingRequest) returns (SetAppListingResponse);
  rpc ListMyApps(ListMyAppsRequest) returns (ListMyAppsResponse);
  rpc Session(stream Frame) returns (stream Frame);
  rpc SuspendSpawn(SuspendSpawnRequest) returns (SuspendSpawnResponse);
  rpc ResumeSpawn(ResumeSpawnRequest) returns (ResumeSpawnResponse);
  rpc RecreateSpawn(RecreateSpawnRequest) returns (RecreateSpawnResponse);
  rpc RenameSpawn(RenameSpawnRequest) returns (RenameSpawnResponse);
  rpc SetSpawnModel(SetSpawnModelRequest) returns (SetSpawnModelResponse);
  rpc DeleteSpawn(DeleteSpawnRequest) returns (DeleteSpawnResponse);
  rpc StopSpawn(StopSpawnRequest) returns (StopSpawnResponse);   // legacy cleanup path; kept (used by spawnctl + e2e)
  rpc ListSessions(ListSessionsRequest)   returns (ListSessionsResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc CloseSession(CloseSessionRequest)   returns (CloseSessionResponse);
  // Owner-sealed secret delivery (sp-2ckv.4): the owner client fetches the hosting node's verified
  // key material, seals locally, and hands the ciphertext back for the CP to relay (ciphertext-only).
  rpc GetSpawnNodeKey(GetSpawnNodeKeyRequest) returns (GetSpawnNodeKeyResponse);
  rpc DeliverSecrets(DeliverSecretsRequest)   returns (DeliverSecretsResponse);
  // Data-only local<->cloud migration (sp-u53.5.3): claim-guarded suspend on the source node ->
  // resume with a placement override on the target. The owner client re-delivers the owner-sealed
  // journal key to the target via DeliverSecrets so the journaled mounts restore there.
  rpc MigrateSpawn(MigrateSpawnRequest) returns (MigrateSpawnResponse);
  // Owner-sealed journal-key ciphertext custody (sp-u53.5.4 deferred to this slice): the owner client
  // fetches the at-rest owner-sealed ciphertext to unseal+reseal on a migration, and (on the
  // node-local -> owner-sealed upgrade) stores it. Owner-only; the CP holds ONLY ciphertext.
  rpc GetJournalKeyCiphertext(GetJournalKeyCiphertextRequest) returns (GetJournalKeyCiphertextResponse);
  rpc PutJournalKeyCiphertext(PutJournalKeyCiphertextRequest) returns (PutJournalKeyCiphertextResponse);
  // Two-phase sign-after-resolve (A4 §5 [AC1][AM1]): the client polls for the CP-committed
  // tuple it must sign, then submits its signed intent to unblock provision.
  rpc GetPendingIntent(GetPendingIntentRequest) returns (GetPendingIntentResponse);
  rpc SubmitIntent(SubmitIntentRequest) returns (SubmitIntentResponse);
}

// The durable spawn lifecycle, surfaced to clients (mirrors the DAO status machine).
enum SpawnStatus {
  SPAWN_STATUS_UNSPECIFIED = 0;
  SPAWN_STATUS_STARTING    = 1;
  SPAWN_STATUS_ACTIVE      = 2;
  SPAWN_STATUS_SUSPENDING  = 3;
  SPAWN_STATUS_SUSPENDED   = 4;
  SPAWN_STATUS_UNREACHABLE = 5;
  SPAWN_STATUS_ERROR       = 6;
  SPAWN_STATUS_DELETED     = 7;
}

// Per-mount backend choice the user picks at spawn time (validated against the app version's
// declared mounts CP-side).
message MountBinding { string name = 1; string backend_uri = 2; }

// name (optional): human-readable spawn label; empty => the server assigns a default
// (the app's display name, with a " 2"/" 3" counter suffix on collision).
// image + runnable_id (optional today) select the agent container image (FQDN) and the
// runnable within it (e.g. "goose-acp"); the CP resolves the run mode from the runnable.
message CreateSpawnRequest  { string app_id = 1; string model = 2; repeated MountBinding mounts = 3; string version = 4; bool pin = 5; string name = 6; string image = 7; string runnable_id = 8; }
message CreateSpawnResponse { string spawn_id = 1; }

message SpawnSummary {
  string spawn_id     = 1;
  string app_id       = 2;
  string app_version  = 3;
  string model        = 4;
  SpawnStatus status  = 5;
  int64  created_at   = 6;
  int64  last_used_at = 7;
  string name         = 8; // human-readable spawn label (server-assigned default if not set by the client)
  string mode         = 9; // run mode: "acp" | "tmux" | "" (default "acp")
  bool   model_applied = 10; // running pod's effective model == spawns.model (false => pending switch)
  // generation (field 11): current live episode generation [AM11]. Clients need this to
  // validate the signed-open tuple for A4 SessionOpen intent.
  uint64 generation   = 11;
}
// Owner is resolved from the auth context server-side (no field needed), like CreateSpawn/StopSpawn.
message ListSpawnsRequest  {}
message ListSpawnsResponse { repeated SpawnSummary spawns = 1; }

message SuspendSpawnRequest   { string spawn_id = 1; }
message SuspendSpawnResponse  {}
message ResumeSpawnRequest    { string spawn_id = 1; }
message ResumeSpawnResponse   {}
message RecreateSpawnRequest  { string spawn_id = 1; }
message RecreateSpawnResponse {}
message RenameSpawnRequest    { string spawn_id = 1; string name = 2; }
message RenameSpawnResponse   {}
// Change the model an already-running spawn uses (persist + best-effort live push).
// applied = the live pod's effective model now matches `model` (false => saved but pending).
message SetSpawnModelRequest  { string spawn_id = 1; string model = 2; }
message SetSpawnModelResponse { string model = 1; bool applied = 2; }
message DeleteSpawnRequest    { string spawn_id = 1; bool destroy_data = 2; }
message DeleteSpawnResponse   {}

// reauth_token: a TEXT control message carrying a new AS-signed token for in-band re-presentation
// (~15 min, aligned with access-token TTL). Non-empty reauth_token is consumed by the recv loop
// and NEVER forwarded to FromClient. Client sides land in A3/A5; CP is tolerant in dev mode.
// session_auth (field 4): A4 session-open AuthEnvelope, carried only on the first (bind) frame
// [AC1]. The CP mints the aud=node token from the intent's SPKI DER in dev mode when
// access_token is empty [AM12]. Subsequent data frames must not set this field.
message Frame { string spawn_id = 1; bytes data = 2; string reauth_token = 3; auth.v1.AuthEnvelope session_auth = 4; }

// Client-facing transport (mirrors node.v1.SessionTransport ordinals).
enum SessionTransport {
  SESSION_TRANSPORT_UNSPECIFIED = 0;
  SESSION_TRANSPORT_ACP         = 1;
  SESSION_TRANSPORT_MOSH        = 2;
}
// One session in a spawn, as surfaced to clients (CP's mirrored roster).
message SessionDescriptor {
  string session_id          = 1;
  SessionTransport transport = 2;
  string runnable            = 3;
  string status              = 4;  // "starting" | "active" | "closing" | "closed" | "error"
  bool pinned                = 5;
}
message ListSessionsRequest  { string spawn_id = 1; }
message ListSessionsResponse { repeated SessionDescriptor sessions = 1; }
// transport + runnable come from the runnable's catalog metadata (web picks; sp-npxq.4).
message CreateSessionRequest  { string spawn_id = 1; SessionTransport transport = 2; string runnable = 3; }
// Empty: the node allocates the id; the client learns it from a subsequent ListSessions/roster (sp-npxq.4 correlation).
message CreateSessionResponse {}
message CloseSessionRequest   { string spawn_id = 1; string session_id = 2; }
message CloseSessionResponse  {}

message StopSpawnRequest  { string spawn_id = 1; }
message StopSpawnResponse {}

// Marketplace trust tier of an App version (E5 §5). Runtime restrictions scale with it.
enum TrustTier {
  TRUST_TIER_UNSPECIFIED = 0;
  TRUST_TIER_UNVERIFIED  = 1; // published, structural checks only / scan declined
  TRUST_TIER_SCANNED     = 2; // passed the automated scanner (E8 §5)
  TRUST_TIER_REVIEWED    = 3; // human-reviewed
}

message AppSummary {
  string id             = 1; // creator/app handle
  string display_name   = 2;
  string summary        = 3;
  repeated string tags  = 4;
  string latest_version = 5; // newest version; "" if none
  TrustTier latest_tier = 6;
  bool listed = 7;
}

message AppVersionSummary {
  string version    = 1;
  string ref        = 2;
  TrustTier tier    = 3;
  int64 created_at  = 4;
}

message ListAppsRequest  { string query = 1; } // empty = browse all
message ListAppsResponse { repeated AppSummary apps = 1; }

// One runnable derived from an image's binaries via the shared agentcaps registry.
message RunnableInfo { string id = 1; string label = 2; string mode = 3; }
// One registered agent image and the binaries it ships, with derived runnables.
message AgentImageInfo { string image = 1; int64 created_at = 2; repeated string binaries = 3; repeated RunnableInfo runnables = 4; }
message ListAgentImagesRequest  {}
message ListAgentImagesResponse { repeated AgentImageInfo images = 1; }

message GetAppRequest  { string id = 1; }
message GetAppResponse {
  AppSummary app = 1;                      // app metadata + latest tier
  repeated AppVersionSummary versions = 2; // newest first
  AppManifest manifest = 3;
}

// AppManifest is the structured app-version manifest — the registration source of truth
// (mirrors spawneryapp.yml, E0 §3). CI maps YAML -> this and calls RegisterAppVersion.
message AppManifest {
  string api_version          = 1;  // "spawnery/v1"
  string id                   = 2;  // "creator/app"
  string title                = 3;
  string description          = 4;
  repeated string tags        = 5;
  string visibility           = 6;  // "open" | "private"
  ManifestAgents agents       = 7;
  repeated string tools       = 8;
  string persona              = 9;
  repeated string skills      = 10;
  ManifestModel model         = 11;
  string runtime_base_version = 12;
  repeated ManifestMount mounts = 13;
}
message ManifestAgents {
  repeated string support      = 1;
  repeated string exclude      = 2;
  repeated string requires_acp = 3;
}
message ManifestModel {
  bool tool_use              = 1;
  int64 min_context_tokens   = 2;
  bool vision                = 3;
  string recommended_default = 4;
}
message ManifestMount { string name = 1; string path = 2; string seed = 3; }

message RegisterAppVersionRequest {
  AppManifest manifest = 1;
  string version       = 2;
  string ref           = 3;
}
message RegisterAppVersionResponse {
  string app_id  = 1;
  string version = 2;
  TrustTier tier = 3;
}

message SetAppListingRequest  { string app_id = 1; bool listed = 2; }
message SetAppListingResponse {}

message ListMyAppsRequest  {}
message ListMyAppsResponse { repeated AppSummary apps = 1; }

// --- Owner-sealed secret delivery (sp-2ckv.4) -------------------------------

// One owner-sealed secret: the agent-side target path the unsealed plaintext lands at (RELATIVE to the
// per-spawn secrets tmpfs mount), the HPKE ciphertext sealed by the owner client to the node's verified
// sub-key (JSON-encoded seal.NodeSealed — the CP never unseals it), and an opaque secret id for logs.
message SealedSecret { string target_path = 1; bytes sealed = 2; string secret_id = 3; }

// GetSpawnNodeKey returns the hosting node's relayed key material so the owner client can verify the
// node (pinned roots + SAN + revocation + sub-key signature) and seal to it. generation is the spawn's
// live episode generation — the owner binds it into the in-flight AAD so a ciphertext is useless against
// any other episode. node_cert_chain is the node's leaf+chain PEM (captured from the node's mTLS to the
// CP; empty in insecure/dev mode, where verification is relaxed). signed_subkey is the JSON SignedSubKey.
message GetSpawnNodeKeyRequest  { string spawn_id = 1; }
message GetSpawnNodeKeyResponse { bytes node_cert_chain = 1; bytes signed_subkey = 2; uint64 generation = 3; }

// DeliverSecrets hands the CP owner-sealed ciphertext to relay to the spawn's live node (ciphertext-only;
// the CP stores nothing in plaintext and never unseals). The CP stamps the live generation and forwards
// a SecretDelivery on the node's Attach stream.
message DeliverSecretsRequest  { string spawn_id = 1; repeated SealedSecret secrets = 2; }
message DeliverSecretsResponse {}

// MigrateSpawn picks the resume target either by exact node id (target_node_id) or, when that is
// empty, by node CLASS (target_class, e.g. "cloud"). Tenancy still applies: a self-hosted target
// must belong to the spawn owner. node_id in the response is the node the spawn resumed on.
message MigrateSpawnRequest  { string spawn_id = 1; string target_node_id = 2; string target_class = 3; }
message MigrateSpawnResponse { string node_id = 1; }

// JournalKeyCiphertext is one mount's owner-sealed journal-password ciphertext (a JSON-encoded
// seal.Envelope, opaque to the CP). mount is the originating mount label (journalkey.SecretID
// namespace); ciphertext is the at-rest owner-sealed bytes.
message JournalKeyCiphertext { string mount = 1; bytes ciphertext = 2; }

message GetJournalKeyCiphertextRequest  { string spawn_id = 1; }
message GetJournalKeyCiphertextResponse { repeated JournalKeyCiphertext entries = 1; }
message PutJournalKeyCiphertextRequest  { string spawn_id = 1; repeated JournalKeyCiphertext entries = 2; }
message PutJournalKeyCiphertextResponse {}

// --- Two-phase sign-after-resolve (A4 §5 [AC1][AM1]) --------------------------------

// PendingIntent is the CP-committed tuple the client must validate and sign [AM1].
// Clients MUST reconstruct the IntentBody from their own pended record and only validate
// that the CP tuple matches — never sign CP-supplied opaque bytes.
message PendingIntent {
  string op             = 1; // e.g. "create-spawn"
  string spawn_id       = 2;
  uint64 generation     = 3;
  string target_node_id = 4;
  string image          = 5;
  string app_ref        = 6;
  string model          = 7;
  string data_ref       = 8;
  repeated MountBinding mounts = 9;
}

// GetPendingIntent polls for the CP-committed tuple for a spawn's in-flight lifecycle op.
// ready=false while the CP is still resolving placement; poll until ready.
message GetPendingIntentRequest  { string spawn_id = 1; }
message GetPendingIntentResponse { PendingIntent pending = 1; bool ready = 2; }

// SubmitIntent delivers the client's signed intent to unblock the pending provision.
// node_access_token is the client's aud=node AS-signed token (cnf-bound to the same session
// key that signed the intent). Both travel verbatim in the AuthEnvelope to the node.
message SubmitIntentRequest {
  string               spawn_id          = 1;
  auth.v1.SignedIntent intent             = 2;
  string               node_access_token = 3; // aud=node token for the AuthEnvelope
}
message SubmitIntentResponse {}
