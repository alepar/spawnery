syntax = "proto3";
package cp.v1;
option go_package = "spawnery/gen/cp/v1;cpv1";

import "auth/v1/auth.proto";

service SpawnService {
  rpc CreateSpawn(CreateSpawnRequest) returns (CreateSpawnResponse);
  rpc ListSpawns(ListSpawnsRequest) returns (ListSpawnsResponse);
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);
  rpc ListAgentImages(ListAgentImagesRequest) returns (ListAgentImagesResponse);
  rpc GetApp(GetAppRequest) returns (GetAppResponse);
  rpc RegisterAppVersion(RegisterAppVersionRequest) returns (RegisterAppVersionResponse);
  rpc SetAppListing(SetAppListingRequest) returns (SetAppListingResponse);
  rpc ListMyApps(ListMyAppsRequest) returns (ListMyAppsResponse);
  rpc Session(stream Frame) returns (stream Frame);
  rpc SuspendSpawn(SuspendSpawnRequest) returns (SuspendSpawnResponse);
  rpc ResumeSpawn(ResumeSpawnRequest) returns (ResumeSpawnResponse);
  rpc RecreateSpawn(RecreateSpawnRequest) returns (RecreateSpawnResponse);
  rpc RenameSpawn(RenameSpawnRequest) returns (RenameSpawnResponse);
  rpc SetSpawnModel(SetSpawnModelRequest) returns (SetSpawnModelResponse);
  rpc DeleteSpawn(DeleteSpawnRequest) returns (DeleteSpawnResponse);
  rpc StopSpawn(StopSpawnRequest) returns (StopSpawnResponse);   // legacy cleanup path; kept (used by spawnctl + e2e)
  rpc ListSessions(ListSessionsRequest)   returns (ListSessionsResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc CloseSession(CloseSessionRequest)   returns (CloseSessionResponse);
  // Owner-sealed secret delivery (sp-2ckv.4): the owner client fetches the hosting node's verified
  // key material, seals locally, and hands the ciphertext back for the CP to relay (ciphertext-only).
  rpc GetSpawnNodeKey(GetSpawnNodeKeyRequest) returns (GetSpawnNodeKeyResponse);
  rpc DeliverSecrets(DeliverSecretsRequest)   returns (DeliverSecretsResponse);
  // GitHub access-token refresh coordination (sp-v40s.9): AS asks CP to confirm a node hosts the
  // spawn/link (AuthorizeGitHubMint) and to signal a token rotation to hosting nodes (SignalGitHubTokenRotated).
  // CP is token-free: the signal carries only link-level metadata; nodes re-mint lazily on the next GetToken.
  rpc AuthorizeGitHubMint(AuthorizeGitHubMintRequest) returns (AuthorizeGitHubMintResponse);
  rpc SignalGitHubTokenRotated(SignalGitHubTokenRotatedRequest) returns (SignalGitHubTokenRotatedResponse);
  // Data-only local<->cloud migration (sp-u53.5.3): claim-guarded suspend on the source node ->
  // resume with a placement override on the target. The owner client re-delivers the owner-sealed
  // journal key to the target via DeliverSecrets so the journaled mounts restore there.
  rpc MigrateSpawn(MigrateSpawnRequest) returns (MigrateSpawnResponse);
  // Source-preserving fork foundation: mint a child spawn and transfer-set fork pin, then delegate
  // capture/seeding to the fork materializer seam. The source remains ACTIVE throughout.
  rpc ForkSpawn(ForkSpawnRequest) returns (ForkSpawnResponse);
  // Owner-sealed journal-key ciphertext custody (sp-u53.5.4 deferred to this slice): the owner client
  // fetches the at-rest owner-sealed ciphertext to unseal+reseal on a migration, and (on the
  // node-local -> owner-sealed upgrade) stores it. Owner-only; the CP holds ONLY ciphertext.
  rpc GetJournalKeyCiphertext(GetJournalKeyCiphertextRequest) returns (GetJournalKeyCiphertextResponse);
  rpc PutJournalKeyCiphertext(PutJournalKeyCiphertextRequest) returns (PutJournalKeyCiphertextResponse);
  // Two-phase sign-after-resolve (A4 §5 [AC1][AM1]): the client polls for the CP-committed
  // tuple it must sign, then submits its signed intent to unblock provision.
  rpc GetPendingIntent(GetPendingIntentRequest) returns (GetPendingIntentResponse);
  rpc SubmitIntent(SubmitIntentRequest) returns (SubmitIntentResponse);
  // W4: migration target enumeration + node-local->owner-sealed upgrade seam (sp-8dkp).
  rpc ListMigrationTargets(ListMigrationTargetsRequest) returns (ListMigrationTargetsResponse);
  rpc UpgradeToOwnerSealed(UpgradeToOwnerSealedRequest) returns (UpgradeToOwnerSealedResponse);
  // Profile CRUD (sp-nrzf.3.5): owner-scoped customization profiles with CAS version fencing.
  // Owner is resolved from auth context server-side (no owner field in requests).
  rpc CreateProfile(CreateProfileRequest)               returns (CreateProfileResponse);
  rpc GetProfile(GetProfileRequest)                     returns (GetProfileResponse);
  rpc ListProfiles(ListProfilesRequest)                 returns (ListProfilesResponse);
  rpc UpdateProfile(UpdateProfileRequest)               returns (UpdateProfileResponse);
  rpc DeleteProfile(DeleteProfileRequest)               returns (DeleteProfileResponse);
  rpc AddProfileEntry(AddProfileEntryRequest)           returns (AddProfileEntryResponse);
  rpc RemoveProfileEntry(RemoveProfileEntryRequest)     returns (RemoveProfileEntryResponse);
  rpc AddProfileSecretRef(AddProfileSecretRefRequest)   returns (AddProfileSecretRefResponse);
  rpc RemoveProfileSecretRef(RemoveProfileSecretRefRequest) returns (RemoveProfileSecretRefResponse);
  // User secrets catalog CRUD (sp-7h6.1.1): owner-scoped sealed secret metadata + opaque envelope bytes.
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);
  rpc GetSecret(GetSecretRequest)       returns (GetSecretResponse);
  rpc ListSecrets(ListSecretsRequest)   returns (ListSecretsResponse);
  rpc PutSecret(PutSecretRequest)       returns (PutSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  // Customization catalog CRUD (sp-nrzf.3.6): curated catalog entries, creator-scoped writes,
  // globally-readable list (listed=true only). Owner resolved from auth context server-side.
  rpc CreateCatalogEntry(CreateCatalogEntryRequest)     returns (CreateCatalogEntryResponse);
  rpc GetCatalogEntry(GetCatalogEntryRequest)           returns (GetCatalogEntryResponse);
  rpc ListCatalogEntries(ListCatalogEntriesRequest)     returns (ListCatalogEntriesResponse);
  rpc UpdateCatalogEntry(UpdateCatalogEntryRequest)     returns (UpdateCatalogEntryResponse);
  rpc DeleteCatalogEntry(DeleteCatalogEntryRequest)     returns (DeleteCatalogEntryResponse);
  rpc SetCatalogListing(SetCatalogListingRequest)       returns (SetCatalogListingResponse);
}

// The durable spawn lifecycle, surfaced to clients (mirrors the DAO status machine).
enum SpawnStatus {
  SPAWN_STATUS_UNSPECIFIED = 0;
  SPAWN_STATUS_STARTING    = 1;
  SPAWN_STATUS_ACTIVE      = 2;
  SPAWN_STATUS_SUSPENDING  = 3;
  SPAWN_STATUS_SUSPENDED   = 4;
  SPAWN_STATUS_UNREACHABLE = 5;
  SPAWN_STATUS_ERROR       = 6;
  SPAWN_STATUS_DELETED     = 7;
  // RESUMING is the symmetric transient to SUSPENDING (spec §4): a spawn is in this state
  // from the moment the CP begins restoring it (Suspended→Resuming) until the node confirms
  // the pod is live (Resuming→Active). Distinct from STARTING so the UI and sweepers can tell
  // a resume-restore apart from a fresh create; both read as "busy" to background actors.
  SPAWN_STATUS_RESUMING    = 8;
}

// Per-mount backend choice the user picks at spawn time (validated against the app version's
// declared mounts CP-side). GitHub bindings carry non-secret routing metadata; token material
// stays in SealedSecret deliveries.
message MountBinding {
  string name                 = 1;
  string backend_uri          = 2;
  string credential_secret_id = 3;
  bool   create_if_missing    = 4;
  string repository_id        = 5; // audit/validation metadata only; not a token scope guarantee.
}

// ArtifactContentType discriminates how spawnlet materializes an artifact's inline bytes:
// BYTES => a single file written verbatim at `mode`; TAR => a packaged directory tree
// (e.g. a SKILL.md skill dir) unpacked preserving per-file modes.
enum ArtifactContentType {
  ARTIFACT_CONTENT_TYPE_UNSPECIFIED = 0;
  ARTIFACT_CONTENT_TYPE_BYTES       = 1;
  ARTIFACT_CONTENT_TYPE_TAR         = 2;
}

// ArtifactTarget selects which pod container receives the artifact (engine uses AGENT;
// SIDECAR reserved).
enum ArtifactTarget {
  ARTIFACT_TARGET_UNSPECIFIED = 0;
  ARTIFACT_TARGET_AGENT       = 1;
  ARTIFACT_TARGET_SIDECAR     = 2;
}

// ArtifactSpec is a content-agnostic delivery unit: raw bytes landed into a pod container
// at a confined dest path. Inline-only for MVP (by-ref deferred; reject oversize at CreateSpawn).
// sensitive=true routes the payload through the E2E SealedSecret relay (CP stays
// ciphertext-blind); env_var_name binds a sensitive MCP secret value to its target env var name.
message ArtifactSpec {
  string              id               = 1;
  bytes               inline           = 2;  // inline content; by-ref dropped from MVP
  ArtifactContentType content_type     = 3;
  ArtifactTarget      target_container = 4;
  string              dest_path        = 5;  // path-confined under staging/agent-config root
  uint32              mode             = 6;  // unix mode for BYTES (TAR carries per-file modes)
  bool                sensitive        = 7;
  string              env_var_name     = 8;  // sensitive MCP secret -> env var binding
}

// name (optional): human-readable spawn label; empty => the server assigns a default
// (the app's display name, with a " 2"/" 3" counter suffix on collision).
// image + runnable_id (optional today) select the agent container image (FQDN) and the
// runnable within it (e.g. "goose-acp"); the CP resolves the run mode from the runnable.
message CreateSpawnRequest {
  string app_id = 1;
  string model = 2;
  repeated MountBinding mounts = 3;
  string version = 4;
  bool pin = 5;
  string name = 6;
  string image = 7;
  string runnable_id = 8;
  repeated ArtifactSpec artifacts = 9;
  string profile_id = 10;
  repeated string attached_secret_ids = 11;
}
message CreateSpawnResponse { string spawn_id = 1; }

message SpawnSummary {
  string spawn_id     = 1;
  string app_id       = 2;
  string app_version  = 3;
  string model        = 4;
  SpawnStatus status  = 5;
  int64  created_at   = 6;
  int64  last_used_at = 7;
  string name         = 8; // human-readable spawn label (server-assigned default if not set by the client)
  string mode         = 9; // run mode: "acp" | "tmux" | "" (default "acp")
  bool   model_applied = 10; // running pod's effective model == spawns.model (false => pending switch)
  // generation (field 11): current live episode generation [AM11]. Clients need this to
  // validate the signed-open tuple for A4 SessionOpen intent.
  uint64 generation   = 11;
  // journal_key_delivery_pending (field 12): true when the spawn is active on a target node but the
  // owner client has not yet delivered the owner-sealed journal key (the delivery-retry leg). The UI
  // derives this state on reload (WM3 reload-derivable) to reconstruct the delivery-retry modal leg.
  bool journal_key_delivery_pending = 12;
  // transition_phase and transition_detail (fields 13-14): non-empty when status is Suspending or
  // Resuming — carries the last progress phase/detail emitted by the node (sp-u53.7.2). Populated
  // from the live in-flight waiter; empty for all other statuses. Not persisted — cleared on restart.
  string transition_phase  = 13;
  string transition_detail = 14;
  string parent_spawn_id = 15; // source spawn id when this row was created by ForkSpawn
  int64  forked_at       = 16; // unix seconds when the fork row was minted
  // Live provisioning progress (ephemeral, in-memory; empty unless status=STARTING). sp-m859.3.
  uint32 provision_step       = 17;
  uint32 provision_total      = 18;
  string provision_step_label = 19;
  // Persisted terminal failure (survives CP restart; non-empty only for ERROR spawns). sp-m859.3.
  string error_step   = 20;
  string error_detail = 21;
}
// Owner is resolved from the auth context server-side (no field needed), like CreateSpawn/StopSpawn.
message ListSpawnsRequest  {}
message ListSpawnsResponse { repeated SpawnSummary spawns = 1; }

message SuspendSpawnRequest   { string spawn_id = 1; }
message SuspendSpawnResponse  {}
message ResumeSpawnRequest {
  string spawn_id = 1;
  repeated string attached_secret_ids = 2;
}
message ResumeSpawnResponse   {}
message RecreateSpawnRequest  { string spawn_id = 1; }
message RecreateSpawnResponse {}
message RenameSpawnRequest    { string spawn_id = 1; string name = 2; }
message RenameSpawnResponse   {}
// Change the model an already-running spawn uses (persist + best-effort live push).
// applied = the live pod's effective model now matches `model` (false => saved but pending).
message SetSpawnModelRequest  { string spawn_id = 1; string model = 2; }
message SetSpawnModelResponse { string model = 1; bool applied = 2; }
message DeleteSpawnRequest    { string spawn_id = 1; bool destroy_data = 2; }
message DeleteSpawnResponse   {}

// reauth_token: a TEXT control message carrying a new AS-signed token for in-band re-presentation
// (~15 min, aligned with access-token TTL). Non-empty reauth_token is consumed by the recv loop
// and NEVER forwarded to FromClient. Client sides land in A3/A5; CP is tolerant in dev mode.
// session_auth (field 4): A4 session-open AuthEnvelope, carried only on the first (bind) frame
// [AC1]. The CP mints the aud=node token from the intent's SPKI DER in dev mode when
// access_token is empty [AM12]. Subsequent data frames must not set this field.
message Frame { string spawn_id = 1; bytes data = 2; string reauth_token = 3; auth.v1.AuthEnvelope session_auth = 4; }

// Client-facing transport (mirrors node.v1.SessionTransport ordinals).
enum SessionTransport {
  SESSION_TRANSPORT_UNSPECIFIED = 0;
  SESSION_TRANSPORT_ACP         = 1;
  SESSION_TRANSPORT_MOSH        = 2;
}
// One session in a spawn, as surfaced to clients (CP's mirrored roster).
message SessionDescriptor {
  string session_id          = 1;
  SessionTransport transport = 2;
  string runnable            = 3;
  string status              = 4;  // "starting" | "active" | "closing" | "closed" | "error"
  bool pinned                = 5;
}
message ListSessionsRequest  { string spawn_id = 1; }
message ListSessionsResponse { repeated SessionDescriptor sessions = 1; }
// transport + runnable come from the runnable's catalog metadata (web picks; sp-npxq.4).
message CreateSessionRequest  { string spawn_id = 1; SessionTransport transport = 2; string runnable = 3; }
// Empty: the node allocates the id; the client learns it from a subsequent ListSessions/roster (sp-npxq.4 correlation).
message CreateSessionResponse {}
message CloseSessionRequest   { string spawn_id = 1; string session_id = 2; }
message CloseSessionResponse  {}

message StopSpawnRequest  { string spawn_id = 1; }
message StopSpawnResponse {}

// Marketplace trust tier of an App version (E5 §5). Runtime restrictions scale with it.
enum TrustTier {
  TRUST_TIER_UNSPECIFIED = 0;
  TRUST_TIER_UNVERIFIED  = 1; // published, structural checks only / scan declined
  TRUST_TIER_SCANNED     = 2; // passed the automated scanner (E8 §5)
  TRUST_TIER_REVIEWED    = 3; // human-reviewed
}

message AppSummary {
  string id             = 1; // creator/app handle
  string display_name   = 2;
  string summary        = 3;
  repeated string tags  = 4;
  string latest_version = 5; // newest version; "" if none
  TrustTier latest_tier = 6;
  bool listed = 7;
}

message AppVersionSummary {
  string version    = 1;
  string ref        = 2;
  TrustTier tier    = 3;
  int64 created_at  = 4;
}

message ListAppsRequest  { string query = 1; } // empty = browse all
message ListAppsResponse { repeated AppSummary apps = 1; }

// One runnable derived from an image's binaries via the shared agentcaps registry.
message RunnableInfo { string id = 1; string label = 2; string mode = 3; }
// One registered agent image and the binaries it ships, with derived runnables.
message AgentImageInfo { string image = 1; int64 created_at = 2; repeated string binaries = 3; repeated RunnableInfo runnables = 4; }
message ListAgentImagesRequest  {}
message ListAgentImagesResponse { repeated AgentImageInfo images = 1; }

message GetAppRequest  { string id = 1; }
message GetAppResponse {
  AppSummary app = 1;                      // app metadata + latest tier
  repeated AppVersionSummary versions = 2; // newest first
  AppManifest manifest = 3;
}

// AppManifest is the structured app-version manifest — the registration source of truth
// (mirrors spawneryapp.yml, E0 §3). CI maps YAML -> this and calls RegisterAppVersion.
message AppManifest {
  string api_version          = 1;  // "spawnery/v1"
  string id                   = 2;  // "creator/app"
  string title                = 3;
  string description          = 4;
  repeated string tags        = 5;
  string visibility           = 6;  // "open" | "private"
  ManifestAgents agents       = 7;
  repeated string tools       = 8;
  string persona              = 9;
  repeated string skills      = 10;
  ManifestModel model         = 11;
  string runtime_base_version = 12;
  repeated ManifestMount mounts = 13;
  repeated ArtifactSpec artifacts = 14;  // publisher-supplied per-app default artifacts
}
message ManifestAgents {
  repeated string support      = 1;
  repeated string exclude      = 2;
  repeated string requires_acp = 3;
}
message ManifestModel {
  bool tool_use              = 1;
  int64 min_context_tokens   = 2;
  bool vision                = 3;
  string recommended_default = 4;
}
// durability (field 4): per-mount durability class (transient-tier §1a): "ephemeral" (default),
// "node-local", or "owner-sealed". Empty/unset = ephemeral (no journaling).
// durability (field 4): per-mount durability class (transient-tier §1a): "ephemeral" (default),
// "node-local", or "owner-sealed". Empty/unset = ephemeral (no journaling).
// github (field 5): marks this mount as a GitHub SLOT (live-dev D1). The app declares the slot
// (name/path/durability); the USER supplies owner/repo at create. The CP requires a
// github:owner/repo binding for a slot and (T3) auto-resolves the creator's gh:<account> link into a
// node-JIT-mint link-ref — no token is named here. A github slot MUST use a journaled durability
// class (node-local|owner-sealed); ephemeral loses the clone on suspend (§16.7).
message ManifestMount { string name = 1; string path = 2; string seed = 3; string durability = 4; bool github = 5; }

message RegisterAppVersionRequest {
  AppManifest manifest = 1;
  string version       = 2;
  string ref           = 3;
}
message RegisterAppVersionResponse {
  string app_id  = 1;
  string version = 2;
  TrustTier tier = 3;
}

message SetAppListingRequest  { string app_id = 1; bool listed = 2; }
message SetAppListingResponse {}

message ListMyAppsRequest  {}
message ListMyAppsResponse { repeated AppSummary apps = 1; }

// --- Owner-sealed secret delivery (sp-2ckv.4) -------------------------------

// One owner-sealed secret: the agent-side target path the unsealed plaintext lands at (RELATIVE to the
// per-spawn secrets tmpfs mount), the HPKE ciphertext sealed by the owner client to the node's verified
// sub-key (JSON-encoded seal.NodeSealed — the CP never unseals it), and an opaque secret id for logs.
enum SecretType {
  SECRET_TYPE_UNSPECIFIED  = 0;
  SECRET_TYPE_GITHUB_TOKEN = 1;
}

enum SecretUsage {
  SECRET_USAGE_UNSPECIFIED  = 0;
  SECRET_USAGE_NODE_STORAGE = 1;
  SECRET_USAGE_AGENT_RENDER = 2;
}

message SecretRenderSpec {
  string profile                = 1; // e.g. "gh-cli-v1"; consumers validate known profiles.
  string target_path            = 2; // relative to the per-spawn secrets tmpfs.
  string gh_config_dir          = 3; // relative directory for GH_CONFIG_DIR material.
  string hosts_path             = 4; // relative hosts.yml path for gh.
  string git_config_path        = 5; // relative git config path used by the agent.
  string credential_helper_path = 6; // relative helper path/config target.
}

message GitHubTokenClearMetadata {
  string host                    = 1; // MVP accepts github.com; future GHE validation hook.
  string login                   = 2; // display/render fact; not an authz key.
  string github_user_id          = 3; // immutable GitHub user id when available.
  int64  refresh_expires_at_unix = 4; // clear validation/UX metadata; token remains sealed.
  string app_client_id           = 5; // GitHub App/client identity expected by AS minting.
  int64  access_expires_at_unix  = 6; // precise access-token expiry; drives proactive refresh scheduling on resume.
}

// One owner-sealed secret supplied by the owner client. Fields 1-3 are the existing ciphertext
// relay contract. Fields 4+ are non-secret routing metadata that CP can relay to node.v1 without
// unsealing; replay semantics for version/delivery_id are owned by sp-7h6.1.8.
message SealedSecret {
  string target_path = 1;
  bytes  sealed      = 2;
  string secret_id   = 3;

  SecretType               type         = 4;
  uint64                   version      = 5;
  string                   delivery_id  = 6;
  repeated SecretUsage     usages       = 7;
  repeated string          mount_names  = 8;
  SecretRenderSpec         render       = 9;
  GitHubTokenClearMetadata github_token = 10;
}

// GetSpawnNodeKey returns the hosting node's relayed key material so the owner client can verify the
// node (pinned roots + SAN + revocation + sub-key signature) and seal to it. generation is the spawn's
// live episode generation — the owner binds it into the in-flight AAD so a ciphertext is useless against
// any other episode. node_cert_chain is the node's leaf+chain PEM (captured from the node's mTLS to the
// CP; empty in insecure/dev mode, where verification is relaxed). signed_subkey is the JSON SignedSubKey.
message GetSpawnNodeKeyRequest  { string spawn_id = 1; }
message GetSpawnNodeKeyResponse { bytes node_cert_chain = 1; bytes signed_subkey = 2; uint64 generation = 3; }

// DeliverSecrets hands the CP owner-sealed ciphertext to relay to the spawn's live node (ciphertext-only;
// the CP stores nothing in plaintext and never unseals). The CP stamps the live generation and forwards
// a SecretDelivery on the node's Attach stream.
message DeliverSecretsRequest  { string spawn_id = 1; repeated SealedSecret secrets = 2; }
message DeliverSecretsResponse {}

message AuthorizeGitHubMintRequest {
  string node_id       = 1;
  string spawn_id      = 2;
  uint64 generation    = 3;
  string secret_id     = 4;
  uint64 version       = 5;
  string delivery_id   = 6;
  string repository_id = 7;
}
message AuthorizeGitHubMintResponse {}

// SignalGitHubTokenRotated is the token-free AS→CP rotation heads-up (sp-v40s.22.1).
// The CP fans the signal out to hosting nodes as a CPMessage.github_token_rotated; nodes
// advance their version-gate pointer and lazy-invalidate the stale cached token.
message SignalGitHubTokenRotatedRequest {
  string secret_id              = 1;
  uint64 version                = 2;
  string delivery_id            = 3;
  int64  access_expires_at_unix = 4; // non-secret; lets nodes reschedule proactive refresh
}
message SignalGitHubTokenRotatedResponse {}

// MigrateSpawn picks the resume target either by exact node id (target_node_id) or, when that is
// empty, by node CLASS (target_class, e.g. "cloud"). Tenancy still applies: a self-hosted target
// must belong to the spawn owner. node_id in the response is the node the spawn resumed on.
// upgrade_to_owner_sealed (field 4): when true the caller has already upgraded node-local mounts to
// owner-sealed (via UpgradeToOwnerSealed) and the durability guard may proceed for those mounts.
message MigrateSpawnRequest  { string spawn_id = 1; string target_node_id = 2; string target_class = 3; bool upgrade_to_owner_sealed = 4; }
message MigrateSpawnResponse {
  string node_id = 1;
  // transfer_set_id is the CP-pinned migration transfer set recorded before source capture.
  string transfer_set_id = 2;
}
message ForkSpawnRequest {
  string spawn_id = 1;        // source spawn id, matching existing lifecycle RPC naming
  string target_node_id = 2;  // optional exact target; empty defaults to same node
  string target_class = 3;    // optional class picker; mutually exclusive with target_node_id
  string name = 4;            // optional fork display name
}
message ForkSpawnResponse {
  string fork_spawn_id = 1;
  string transfer_set_id = 2;
  string node_id = 3;
}

// JournalKeyCiphertext is one mount's owner-sealed journal-password ciphertext (a JSON-encoded
// seal.Envelope, opaque to the CP). mount is the originating mount label (journalkey.SecretID
// namespace); ciphertext is the at-rest owner-sealed bytes.
message JournalKeyCiphertext { string mount = 1; bytes ciphertext = 2; }

message GetJournalKeyCiphertextRequest  { string spawn_id = 1; }
message GetJournalKeyCiphertextResponse { repeated JournalKeyCiphertext entries = 1; }
message PutJournalKeyCiphertextRequest  { string spawn_id = 1; repeated JournalKeyCiphertext entries = 2; }
message PutJournalKeyCiphertextResponse {}

// --- Two-phase sign-after-resolve (A4 §5 [AC1][AM1]) --------------------------------

// PendingIntent is the CP-committed tuple the client must validate and sign [AM1].
// Clients MUST reconstruct the IntentBody from their own pended record and only validate
// that the CP tuple matches — never sign CP-supplied opaque bytes.
message PendingIntent {
  string op             = 1; // e.g. "create-spawn"
  string spawn_id       = 2;
  uint64 generation     = 3;
  string target_node_id = 4;
  string image          = 5;
  string app_ref        = 6;
  string model          = 7;
  string data_ref       = 8;
  repeated MountBinding mounts = 9;
  repeated string attached_secret_ids = 10;
}

// GetPendingIntent polls for the CP-committed tuple for a spawn's in-flight lifecycle op.
// ready=false while the CP is still resolving placement; poll until ready.
message GetPendingIntentRequest  { string spawn_id = 1; }
message GetPendingIntentResponse {
  PendingIntent pending = 1;
  bool ready = 2;
  bytes node_cert_chain = 3;
  bytes signed_subkey = 4;
  uint64 generation = 5;
}

// SubmitIntent delivers the client's signed intent to unblock the pending provision.
// node_access_token is the client's aud=node AS-signed token (cnf-bound to the same session
// key that signed the intent). Both travel verbatim in the AuthEnvelope to the node.
message SubmitIntentRequest {
  string               spawn_id          = 1;
  auth.v1.SignedIntent intent             = 2;
  string               node_access_token = 3; // aud=node token for the AuthEnvelope
  repeated SealedSecret secrets           = 4; // owner-sealed payloads to relay into StartSpawn
}
message SubmitIntentResponse {}

// --- W4: Migration target enumeration (sp-8dkp) ----------------------------

// MigrationTarget is one candidate node for a spawn migration.
// journal_size_bytes is best-effort/0 when stats aren't cheaply available (size/ETA follow-up bead sp-e642).
message MigrationTarget {
  string node_id            = 1;
  string class              = 2; // "cloud" | "self-hosted"
  bool   yours              = 3; // owned by the requesting user (always true for self-hosted)
  bool   online             = 4; // heartbeated within the live window
  bool   is_current         = 5; // this is the spawn's current hosting node
  uint64 journal_size_bytes = 6; // best-effort journal size (0 = unknown)
}

message ListMigrationTargetsRequest  { string spawn_id = 1; }
message ListMigrationTargetsResponse {
  repeated MigrationTarget targets = 1;
  // spawn_durability_class is the CP-resolved durability of the spawn's storage:
  // "ephemeral", "node-local", or "owner-sealed". This is the authoritative class for
  // the browser client to decide whether to offer the upgrade pivot (WM16); it is needed
  // because journal_size_bytes on each target is hardcoded to 0 until sp-e642.
  string spawn_durability_class = 2;
}

// UpgradeToOwnerSealed asks the CP to instruct the spawn's hosting node to seal the
// existing node-local journal repo password to the owner's device set, storing the
// resulting Envelopes via PutJournalKeyCiphertext. This is the cheap node-local ->
// owner-sealed upgrade (no repo re-encryption). On success the mounts are owner-sealed
// and a subsequent MigrateSpawn with upgrade_to_owner_sealed=true is accepted.
// owner_device_pubkeys are the raw X25519 pubkeys of the owner's currently enrolled devices.
message UpgradeToOwnerSealedRequest  { string spawn_id = 1; repeated bytes owner_device_pubkeys = 2; }
message UpgradeToOwnerSealedResponse {}

// --- Profile CRUD (sp-nrzf.3.5) --------------------------------------------

// ProfileEntryKind discriminates what a ProfileEntry installs into a spawn.
enum ProfileEntryKind {
  PROFILE_ENTRY_KIND_UNSPECIFIED = 0;
  PROFILE_ENTRY_KIND_SKILL       = 1;
  PROFILE_ENTRY_KIND_MCP         = 2;
  PROFILE_ENTRY_KIND_CONFIG      = 3;
  PROFILE_ENTRY_KIND_PLUGIN      = 4;
}

// ProfileEntrySource discriminates where a ProfileEntry's content originates.
enum ProfileEntrySource {
  PROFILE_ENTRY_SOURCE_UNSPECIFIED  = 0;
  PROFILE_ENTRY_SOURCE_CATALOG_REF  = 1;
  PROFILE_ENTRY_SOURCE_CUSTOM       = 2;
}

// ProfileEntry carries one customization item (skill, MCP server, config, or plugin).
message ProfileEntry {
  string            entry_id        = 1;
  ProfileEntryKind  kind            = 2;
  string            name            = 3;
  ProfileEntrySource source         = 4;
  string            catalog_id      = 5; // set when source=CATALOG_REF
  bytes             custom_inline   = 6; // set when source=CUSTOM (inline MVP; by-ref deferred)
  repeated string   targets         = 7; // spawn targets; empty → ["all"]
  repeated string   mcp_secret_refs = 8; // env-var names for MCP secret bindings
}

// Profile is the full profile view including its entries and attached secret ids.
message Profile {
  string                profile_id = 1;
  string                name       = 2;
  uint64                version    = 3; // CAS token
  int64                 updated_at = 4;
  repeated ProfileEntry entries    = 5;
  repeated string       secret_ids = 6;
}

// ProfileSummary is the lightweight list view (no entries/secrets).
message ProfileSummary {
  string profile_id = 1;
  string name       = 2;
  uint64 version    = 3;
  int64  updated_at = 4;
}

message CreateProfileRequest  { string name = 1; }
message CreateProfileResponse { string profile_id = 1; uint64 version = 2; }

message GetProfileRequest  { string profile_id = 1; }
message GetProfileResponse { Profile profile = 1; }

message ListProfilesRequest  {}
message ListProfilesResponse { repeated ProfileSummary profiles = 1; }

// UpdateProfile renames a profile with CAS fencing on expected_version.
message UpdateProfileRequest  { string profile_id = 1; uint64 expected_version = 2; string name = 3; }
message UpdateProfileResponse { uint64 version = 1; }

message DeleteProfileRequest  { string profile_id = 1; }
message DeleteProfileResponse {}

// AddProfileEntry adds an entry to a profile, CAS-fenced by expected_version.
message AddProfileEntryRequest  { string profile_id = 1; uint64 expected_version = 2; ProfileEntry entry = 3; }
message AddProfileEntryResponse { string entry_id = 1; uint64 version = 2; }

// RemoveProfileEntry removes an entry by entry_id, CAS-fenced.
message RemoveProfileEntryRequest  { string profile_id = 1; uint64 expected_version = 2; string entry_id = 3; }
message RemoveProfileEntryResponse { uint64 version = 1; }

// AddProfileSecretRef attaches a secret reference to the profile, CAS-fenced.
message AddProfileSecretRefRequest  { string profile_id = 1; uint64 expected_version = 2; string secret_id = 3; }
message AddProfileSecretRefResponse { uint64 version = 1; }

// RemoveProfileSecretRef detaches a secret reference from the profile, CAS-fenced.
message RemoveProfileSecretRefRequest  { string profile_id = 1; uint64 expected_version = 2; string secret_id = 3; }
message RemoveProfileSecretRefResponse { uint64 version = 1; }

// --- User secrets catalog (sp-7h6.1.1) ------------------------------------

enum UserSecretType {
  USER_SECRET_TYPE_UNSPECIFIED   = 0;
  USER_SECRET_TYPE_GITHUB_TOKEN  = 1;
  USER_SECRET_TYPE_INFERENCE_KEY = 2;
  USER_SECRET_TYPE_GENERIC_KV    = 3;
}

message SecretWrite {
  string         secret_id        = 1;
  UserSecretType type             = 2;
  string         name             = 3;
  string         provider         = 4;
  ArtifactTarget target_container = 5;
  string         env_var_name     = 6;
  string         dest_path        = 7;
  uint64         deviceset_epoch  = 8;
  bytes          envelope         = 9;
}

message Secret {
  string         secret_id        = 1;
  UserSecretType type             = 2;
  string         name             = 3;
  string         provider         = 4;
  ArtifactTarget target_container = 5;
  string         env_var_name     = 6;
  string         dest_path        = 7;
  uint64         version          = 8;
  uint64         deviceset_epoch  = 9;
  bytes          envelope         = 10;
  int64          created_at       = 11;
  int64          updated_at       = 12;
}

message SecretSummary {
  string         secret_id        = 1;
  UserSecretType type             = 2;
  string         name             = 3;
  string         provider         = 4;
  ArtifactTarget target_container = 5;
  string         env_var_name     = 6;
  string         dest_path        = 7;
  uint64         version          = 8;
  uint64         deviceset_epoch  = 9;
  int64          updated_at       = 10;
}

message CreateSecretRequest  { SecretWrite secret = 1; }
message CreateSecretResponse { Secret secret = 1; }

message GetSecretRequest  { string secret_id = 1; }
message GetSecretResponse { Secret secret = 1; }

message ListSecretsRequest  { uint64 deviceset_epoch_before = 1; }
message ListSecretsResponse { repeated SecretSummary secrets = 1; }

message PutSecretRequest  { SecretWrite secret = 1; uint64 expected_version = 2; }
message PutSecretResponse { Secret secret = 1; }

message DeleteSecretRequest  { string secret_id = 1; }
message DeleteSecretResponse {}

// --- Customization Catalog (sp-nrzf.3.6) -----------------------------------

// CustomizationCatalogEntry is the full view of a curated catalog entry.
message CustomizationCatalogEntry {
  string           catalog_id   = 1;
  string           creator_id   = 2;
  ProfileEntryKind kind         = 3;
  string           name         = 4;
  string           description  = 5;
  bytes            content      = 6;
  bool             listed       = 7;
  int64            created_at   = 8;
  int64            updated_at   = 9;
}

// CatalogEntrySummary is the lightweight list view (omits content).
message CatalogEntrySummary {
  string           catalog_id  = 1;
  ProfileEntryKind kind        = 2;
  string           name        = 3;
  string           description = 4;
}

message CreateCatalogEntryRequest  { ProfileEntryKind kind = 1; string name = 2; string description = 3; bytes content = 4; }
message CreateCatalogEntryResponse { string catalog_id = 1; }

message GetCatalogEntryRequest  { string catalog_id = 1; }
message GetCatalogEntryResponse { CustomizationCatalogEntry entry = 1; }

message ListCatalogEntriesRequest  {}
message ListCatalogEntriesResponse { repeated CatalogEntrySummary entries = 1; }

message UpdateCatalogEntryRequest  { string catalog_id = 1; string name = 2; string description = 3; bytes content = 4; }
message UpdateCatalogEntryResponse {}

message DeleteCatalogEntryRequest  { string catalog_id = 1; }
message DeleteCatalogEntryResponse {}

message SetCatalogListingRequest  { string catalog_id = 1; bool listed = 2; }
message SetCatalogListingResponse {}
