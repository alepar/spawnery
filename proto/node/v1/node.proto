syntax = "proto3";
package node.v1;
option go_package = "spawnery/gen/node/v1;nodev1";

import "auth/v1/auth.proto";

service NodeService {
  // Node dials the CP and holds this stream open. Node sends NodeMessage; CP sends CPMessage.
  rpc Attach(stream NodeMessage) returns (stream CPMessage);
}

// Node-reported runtime phase of a spawn's container. STOPPING/STOPPED = destroy path;
// SUSPENDING/SUSPENDED = suspend path. Values 0-6 are wire-stable; SUSPENDING (7) added for the suspend path.
enum SpawnPhase { SPAWN_PHASE_UNSPECIFIED = 0; STARTING = 1; ACTIVE = 2; STOPPING = 3; STOPPED = 4; ERROR = 5; SUSPENDED = 6; SUSPENDING = 7; }

message NodeMessage {
  oneof msg {
    Register                      register              = 1;
    Heartbeat                     heartbeat             = 2;
    SpawnStatus                   status                = 3;
    Frame                         frame                 = 4;   // agent -> client bytes
    SuspendComplete               suspend_complete      = 5;   // node -> CP: per-mount suspend markers
    SessionRoster                 roster                = 6;   // node -> CP: full live session set for a spawn
    SessionStatus                 session_status        = 7;   // node -> CP: single-session state delta
    SetModelResult                set_model_result      = 8;   // node -> CP: ack/result of a SetModel push
    SealJournalKeyToOwnerResponse seal_journal_key_result = 9; // node -> CP: result of a SealJournalKeyToOwner request (sp-8dkp)
    SuspendProgress               suspend_progress      = 10;  // node -> CP: incremental suspend progress (sp-u53.7.2)
    ResumeProgress                resume_progress       = 11;  // node -> CP: incremental resume/start progress (sp-u53.7.2)
    ForkSameNodeComplete          fork_same_node_complete = 12; // node -> CP: same-node fork capture/seed completion
    ForkTurnBoundaryComplete      fork_turn_boundary_complete = 13; // node -> CP: source has no in-flight ACP turn
    UnpauseIfPausedComplete       unpause_if_paused_complete = 14; // node -> CP: idempotent fork recovery unpause ack
    FailedForkCleanupComplete     failed_fork_cleanup_complete = 15; // node -> CP: failed fork resource cleanup op ack
    ForkSourceRestored            fork_source_restored = 16; // node -> CP: fork source is unpaused/restored; seed may still run
    ForkTransferExported          fork_transfer_exported = 17; // node -> CP: source-side cross-node fork transfer payload export
    ForkTransferImported          fork_transfer_imported = 18; // node -> CP: target-side cross-node fork transfer import complete
  }
}
message CPMessage {
  oneof msg {
    StartSpawn                   start                 = 1;
    StopSpawn                    stop                  = 2;
    SessionOpen                  open                  = 3;
    SessionClose                 close                 = 4;
    Frame                        frame                 = 5;             // client -> agent bytes
    Suspend                      suspend               = 6;             // CP -> node: persist + tear down
    CreateSession                create_session        = 7;             // CP -> node: launch an additional session (impl: sp-npxq.3)
    CloseSession                 close_session         = 8;             // CP -> node: reap one session
    SetModel                     set_model             = 9;             // CP -> node: switch the running pod's effective model (generation-fenced)
    SecretDelivery               secret_delivery       = 10;            // CP -> node: relay owner-sealed secret ciphertext (sp-2ckv.4)
    SealJournalKeyToOwnerRequest seal_journal_key      = 11;            // CP -> node: seal node-local journal password to owner (sp-8dkp)
    ForkSameNode                 fork_same_node        = 12;            // CP -> node: same-node fork capture/seed
    ForkTurnBoundary             fork_turn_boundary    = 13;            // CP -> node: wait until source has no in-flight ACP turn
    UnpauseIfPaused              unpause_if_paused     = 14;            // CP -> node: idempotent source unpause for fork recovery
    ReleaseForkTurnBoundary      release_fork_turn_boundary = 15;       // CP -> node: cancel/release a fork turn-boundary barrier
    FailedForkCleanup            failed_fork_cleanup   = 16;            // CP -> node: cleanup one failed fork resource step
    CancelForkSameNode           cancel_fork_same_node = 17;            // CP -> node: cancel in-flight same-node fork capture/seed
    ForkTransferExport           fork_transfer_export  = 18;            // CP -> node: source-side cross-node fork transfer export
    ForkTransferImport           fork_transfer_import  = 19;            // CP -> node: target-side cross-node fork transfer import
    CancelForkTransfer           cancel_fork_transfer  = 20;            // CP -> node: cancel in-flight cross-node fork transfer work
  }
}

enum SecretType {
  SECRET_TYPE_UNSPECIFIED  = 0;
  SECRET_TYPE_GITHUB_TOKEN = 1;
}

enum SecretUsage {
  SECRET_USAGE_UNSPECIFIED  = 0;
  SECRET_USAGE_NODE_STORAGE = 1;
  SECRET_USAGE_AGENT_RENDER = 2;
}

message SecretRenderSpec {
  string profile                = 1; // e.g. "gh-cli-v1"; consumers validate known profiles.
  string target_path            = 2; // relative to the per-spawn secrets tmpfs.
  string gh_config_dir          = 3; // relative directory for GH_CONFIG_DIR material.
  string hosts_path             = 4; // relative hosts.yml path for gh.
  string git_config_path        = 5; // relative git config path used by the agent.
  string credential_helper_path = 6; // relative helper path/config target.
}

message GitHubTokenClearMetadata {
  string host                    = 1; // MVP accepts github.com; future GHE validation hook.
  string login                   = 2; // display/render fact; not an authz key.
  string github_user_id          = 3; // immutable GitHub user id when available.
  int64  refresh_expires_at_unix = 4; // clear validation/UX metadata; token remains sealed.
  string app_client_id           = 5; // GitHub App/client identity expected by AS minting.
}

// One owner-sealed secret in StartSpawn or SecretDelivery. Fields 1-3 are the legacy ciphertext
// relay contract. Fields 4+ are non-secret routing metadata for consumers such as github-token
// node-storage and agent-render; replay semantics for version/delivery_id are owned by sp-7h6.1.8.
message SealedSecret {
  string target_path = 1;
  bytes  sealed      = 2;
  string secret_id   = 3;

  SecretType               type         = 4;
  uint64                   version      = 5;
  string                   delivery_id  = 6;
  repeated SecretUsage     usages       = 7;
  repeated string          mount_names  = 8;
  SecretRenderSpec         render       = 9;
  GitHubTokenClearMetadata github_token = 10;
}
// CP -> node: deliver owner-sealed secret ciphertext for a spawn (sp-2ckv.4). generation fences the
// delivery against a superseded pod (node-side staleGen drop) AND binds the in-flight HPKE AAD, so a
// ciphertext sealed for one episode cannot open against another. The CP relays bytes only — it never
// unseals (ciphertext-only relay; the node holds the sub-key private half and unseals).
message SecretDelivery { string spawn_id = 1; uint64 generation = 2; repeated SealedSecret secrets = 3; }

// Per-mount backend binding chosen at create/resume (CP -> node).
message MountBinding { string name = 1; string backend_uri = 2; }

// ArtifactContentType discriminates how spawnlet materializes an artifact's inline bytes:
// BYTES => a single file written verbatim at `mode`; TAR => a packaged directory tree
// (e.g. a SKILL.md skill dir) unpacked preserving per-file modes.
enum ArtifactContentType {
  ARTIFACT_CONTENT_TYPE_UNSPECIFIED = 0;
  ARTIFACT_CONTENT_TYPE_BYTES       = 1;
  ARTIFACT_CONTENT_TYPE_TAR         = 2;
}

// ArtifactTarget selects which pod container receives the artifact (engine uses AGENT;
// SIDECAR reserved).
enum ArtifactTarget {
  ARTIFACT_TARGET_UNSPECIFIED = 0;
  ARTIFACT_TARGET_AGENT       = 1;
  ARTIFACT_TARGET_SIDECAR     = 2;
}

// ArtifactSpec is a content-agnostic delivery unit: raw bytes landed into a pod container
// at a confined dest path. Inline-only for MVP (by-ref deferred; reject oversize at CreateSpawn).
// sensitive=true routes the payload through the E2E SealedSecret relay (CP stays
// ciphertext-blind); env_var_name binds a sensitive MCP secret value to its target env var name.
message ArtifactSpec {
  string              id               = 1;
  bytes               inline           = 2;  // inline content; by-ref dropped from MVP
  ArtifactContentType content_type     = 3;
  ArtifactTarget      target_container = 4;
  string              dest_path        = 5;  // path-confined under staging/agent-config root
  uint32              mode             = 6;  // unix mode for BYTES (TAR carries per-file modes)
  bool                sensitive        = 7;
  string              env_var_name     = 8;  // sensitive MCP secret -> env var binding
}
// Per-mount suspend marker reported back after a clean suspend (node -> CP).
message MountMarker  { string name = 1; string marker = 2; }
// Rootfs delta artifact pinned by the CP for migration restore. The artifact is keyed by
// (spawn_id, generation, artifact_id); target restore must use this pinned id, never latest.
message RootfsArtifact {
  string artifact_id = 1;
  uint64 generation = 2;
  int32 sequence = 3;
  string base_image_digest = 4;
  string format = 5;
  string content_digest = 6;
  int64 uncompressed_size = 7;
  string producer_node_id = 8;
  string producer_runtime = 9;
}
// One entry of a node's running-container inventory (node -> CP on Register/Heartbeat).
// Fields 4-5 carry per-spawn resource/idle FACTS reported by the node — data, not decisions.
// CP-side evaluators (quota watchdog, idle reaper) consume them per spec §6; the node never acts
// on them unilaterally. Both fields ride on every Register.running and Heartbeat.running entry.
message RunningSpawn {
  string     spawn_id               = 1;
  uint64     generation             = 2;
  SpawnPhase phase                  = 3;
  // delta_size_bytes: committed per-spawn delta-image size, uncompressed bytes, for the CP quota
  // evaluator. 0 = no delta yet (fresh create) or not applicable (ephemeral / no rootfs capture).
  int64      delta_size_bytes       = 4;
  // last_activity_unix_ms: last observed agent/session activity, epoch milliseconds (UTC), for the
  // CP idle evaluator. 0 = unknown (node has not observed any activity since tracking began).
  int64      last_activity_unix_ms  = 5;
}

// signed_subkey (field 8): the node's current SignedSubKey (JSON-encoded subkey.SignedSubKey) — its
// cert-signed HPKE encryption sub-key, published so the CP can relay it to owner clients for sealing
// (sp-2ckv.4 §1). Empty when the node has no signing identity (insecure/dev mode publishes no sub-key).
message Register    { string node_id = 1; uint32 max_spawns = 2; repeated string agent_images = 3; repeated RunningSpawn running = 4; string node_class = 5; string node_owner = 6; repeated string binaries = 7; bytes signed_subkey = 8; }
// signed_subkey (field 6): re-published on rotation (the node rotates at half-life) so the CP's cached
// sub-key stays fresh without a dedicated message. Empty on heartbeats that carry no rotation.
message Heartbeat   { uint32 active_spawns = 1; uint32 free_slots = 2; uint32 cpu_pct = 3; uint32 gpu_pct = 4; repeated RunningSpawn running = 5; bytes signed_subkey = 6; }
// base_image_digest (field 5): the content-addressable base-image digest resolved by the node
// at create time (spec §4). Non-empty only when phase=ACTIVE on the initial create, so the CP
// can record it for cross-node resume. Empty on phase transitions that have no new digest.
message SpawnStatus { string spawn_id = 1; SpawnPhase phase = 2; string detail = 3; uint64 generation = 4; string base_image_digest = 5; }
// auth (field 20): the client's signed intent + aud=node access token (A4). The node verifies
// the full chain: AS sig on token -> aud=node -> owner match -> SPKI/cnf match -> intent sig
// -> field-by-field correspondence -> freshness -> jti uniqueness. In verify-and-log mode
// (NODE_AUTH_MODE=insecure) failures are logged but not enforced.
// asserted_owner (field 21): the CP-asserted spawn owner (cloud split model, sp-ova §7a).
// base_image_digest (field 22): pinned base digest for cross-node resume (sp-ei4.1.10);
// empty on fresh create. The node resolves and records the digest at create time; on resume
// the CP threads the stored digest down so the node launches from the exact same base image.
message StartSpawn  {
  string spawn_id    = 1;
  string app_ref     = 2;
  string data_ref    = 3;
  string model       = 4;
  uint64 generation  = 5;
  repeated MountBinding mounts = 6;
  string name        = 7;
  string app_id      = 8;
  string image       = 9;
  string runnable_id = 10;
  string mode        = 11;
  repeated ArtifactSpec artifacts = 12;
  auth.v1.AuthEnvelope auth           = 20;
  string               asserted_owner = 21;
  string               base_image_digest = 22;
  uint64               rootfs_source_generation = 23;
  repeated RootfsArtifact rootfs_artifacts = 24;
  // Self-contained owner-sealed secret attachments needed by the node at start/resume time.
  // GitHub storage credentials ride here, not as spawn artifacts. Consumers enforce the
  // declared type/usages/mount_names/render/github_token routing metadata; sp-7h6.1.8 owns
  // version and delivery_id replay guards.
  repeated SealedSecret secrets = 25;
  // rootfs_artifacts_local_only means rootfs_artifacts are metadata for an already-local
  // spawnery/delta:<spawn_id> image. The node must not restore them and must fail the start
  // if that local delta image is absent. Unset means rootfs_artifacts are restore inputs.
  bool                 rootfs_artifacts_local_only = 26;
}
message StopSpawn   { string spawn_id = 1; uint64 generation = 2; }
message Suspend     { string spawn_id = 1; uint64 generation = 2; bool capture_rootfs_artifact = 3; }
message SuspendComplete {
  string spawn_id = 1;
  uint64 generation = 2;
  repeated MountMarker markers = 3;
  repeated RootfsArtifact rootfs_artifacts = 4;
  string error = 5; // non-empty on a fail-closed suspend gate failure; empty on success
}
message ForkSameNode {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  uint64 source_generation = 3;
  uint64 target_generation = 4;
  string transfer_set_id = 5;
}
message ForkTransferExport {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  uint64 source_generation = 3;
  uint64 target_generation = 4;
  string transfer_set_id = 5;
  string target_node_id = 6;
  string target_node_class = 7;
  string target_node_owner = 8;
  bytes target_signed_subkey = 9;
  bytes target_node_cert_chain = 10; // concatenated target leaf + intermediates from CP's mTLS context
}
message ForkTransferExported {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  string transfer_set_id = 3;
  bytes sealed_transfer_key = 4; // HPKE NodeSealed JSON bytes; CP relays opaquely
  bytes payload = 5;             // AES-GCM sealed transfer payload; CP relays opaquely
  string error = 6;
}
message ForkTransferImport {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  uint64 target_generation = 3;
  string transfer_set_id = 4;
  bytes sealed_transfer_key = 5;
  bytes payload = 6;
}
message ForkTransferImported {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  string transfer_set_id = 3;
  repeated MountMarker mounts = 4;
  repeated RootfsArtifact rootfs_artifacts = 5;
  string node_id = 6;
  string error = 7;
}
message CancelForkTransfer {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  string transfer_set_id = 3;
}
message CancelForkSameNode {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  string transfer_set_id = 3;
}
message ForkTurnBoundary {
  string source_spawn_id = 1;
  uint64 source_generation = 2;
  string transfer_set_id = 3;
}
message ForkTurnBoundaryComplete {
  string source_spawn_id = 1;
  uint64 source_generation = 2;
  string transfer_set_id = 3;
  string error = 4;
}
message ReleaseForkTurnBoundary {
  string source_spawn_id = 1;
  uint64 source_generation = 2;
  string transfer_set_id = 3;
}
enum FailedForkCleanupOp {
  FAILED_FORK_CLEANUP_OP_UNSPECIFIED       = 0;
  FAILED_FORK_CLEANUP_OP_REVOKE_GENERATION = 1;
  FAILED_FORK_CLEANUP_OP_EMPTY_BUCKET      = 2;
  FAILED_FORK_CLEANUP_OP_DROP_BUCKET       = 3;
  FAILED_FORK_CLEANUP_OP_RELEASE_DELTA     = 4;
}
message FailedForkCleanup {
  string request_id = 1;
  string fork_spawn_id = 2;
  uint64 generation = 3;
  string bucket = 4;
  FailedForkCleanupOp op = 5;
}
message FailedForkCleanupComplete {
  string request_id = 1;
  string fork_spawn_id = 2;
  FailedForkCleanupOp op = 3;
  string error = 4;
}
message UnpauseIfPaused {
  string spawn_id = 1;
  uint64 generation = 2;
}
message UnpauseIfPausedComplete {
  string spawn_id = 1;
  uint64 generation = 2;
  string error = 3;
}
message ForkSameNodeComplete {
  string source_spawn_id = 1;
  string fork_spawn_id = 2;
  string transfer_set_id = 3;
  repeated MountMarker mounts = 4;
  repeated RootfsArtifact rootfs_artifacts = 5;
  string node_id = 6;
  string error = 7;
}
message ForkSourceRestored {
  string source_spawn_id = 1;
  uint64 source_generation = 2;
  string transfer_set_id = 3;
  string error = 4;
}
// auth (field 10): the client's session-open signed intent + aud=node access token (A4).
// asserted_owner (field 11): CP-asserted owner for the cloud owner-binding check.
message SessionOpen  {
  string spawn_id   = 1;
  uint64 generation = 2;
  string client_id  = 3;
  int64  cursor     = 4;
  string session_id = 5;
  auth.v1.AuthEnvelope auth           = 10;
  string               asserted_owner = 11;
}
message SessionClose { string spawn_id = 1; uint64 generation = 2; string client_id = 3; string session_id = 4; }
// Frame carries no generation: data frames are correlated to an episode by spawn_id at the session layer.
message Frame        { string spawn_id = 1; bytes data = 2; string client_id = 3; string session_id = 4; }

// Transport decides relay + surface for a session (orthogonal to which runnable runs).
enum SessionTransport {
  SESSION_TRANSPORT_UNSPECIFIED = 0;
  SESSION_TRANSPORT_ACP         = 1;  // node ACP Pump -> web ChatView
  SESSION_TRANSPORT_MOSH        = 2;  // node mosh/tmux PTY relay -> web TerminalView
}
// Per-session lifecycle state the node owns and reports.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_STARTING    = 1;
  SESSION_STATE_ACTIVE      = 2;
  SESSION_STATE_CLOSING     = 3;
  SESSION_STATE_CLOSED      = 4;
  SESSION_STATE_ERROR       = 5;
}
// One session within a spawn. endpoint is an opaque per-transport handle (acp port / tmux session name).
message SessionInfo {
  string session_id          = 1;
  SessionTransport transport = 2;
  string runnable            = 3;
  SessionState state         = 4;
  string endpoint            = 5;
  bool pinned                = 6;   // session #0 is pinned: not closeable
}
// node -> CP: the full live session set for a spawn (sent on any membership change).
message SessionRoster { string spawn_id = 1; uint64 generation = 2; repeated SessionInfo sessions = 3; }
// node -> CP: a single session's state changed (membership unchanged).
message SessionStatus { string spawn_id = 1; string session_id = 2; SessionState state = 3; string detail = 4; }
// CP -> node: launch an additional session. The node allocates the session_id and reports it via SessionRoster.
message CreateSession { string spawn_id = 1; uint64 generation = 2; SessionTransport transport = 3; string runnable = 4; }
// CP -> node: reap one session (by id). Reaping session #0 is rejected node-side (it is pinned).
message CloseSession  { string spawn_id = 1; uint64 generation = 2; string session_id = 3; }
// CP -> node: switch the effective model of the running pod (forwarded to the sidecar override).
// Generation-fenced like StopSpawn/Suspend: the node ignores a SetModel whose generation
// doesn't match the pod it currently holds. request_id correlates this push with its result.
message SetModel       { string spawn_id = 1; uint64 generation = 2; string model = 3; string request_id = 4; }
// node -> CP: result of applying a SetModel. ok=false carries a human reason in detail.
// request_id: the node echoes request_id from the SetModel it handled, so the CP can route the
// result to the exact push that is waiting (a stale ack with no live waiter is dropped).
message SetModelResult { string spawn_id = 1; bool ok = 2; string detail = 3; string request_id = 4; }

// --- sp-u53.7.2: incremental suspend/resume progress --------------------------

// node -> CP: incremental progress during a suspend operation (sp-u53.7.2). Keyed by
// (spawn_id, generation). The CP stall detector resets its timer on each received message,
// so a slow-but-advancing snapshot never false-times-out. phase and detail are informational.
// markers carries accumulated per-mount markers received so far (may be partial).
message SuspendProgress {
  string spawn_id = 1;
  uint64 generation = 2;
  string phase = 3;
  string detail = 4;
  repeated MountMarker markers = 5;
}

// node -> CP: incremental progress during a resume/start restore operation (sp-u53.7.2).
// Keyed by (spawn_id, generation). The CP resume stall detector resets its timer on each
// received message so a slow-but-advancing restore never false-times-out.
message ResumeProgress {
  string spawn_id = 1;
  uint64 generation = 2;
  string phase = 3;
  string detail = 4;
}

// --- W4: node-local -> owner-sealed upgrade seam (sp-8dkp) -------------------

// CP -> node: for each journaled mount of spawn_id, read the node-local repo password and seal it
// to the owner's device set (owner_device_pubkeys are raw X25519 pubkeys). The node responds with
// SealJournalKeyToOwnerResponse carrying the sealed Envelope bytes per mount.
// generation fences this against a superseded pod.
// request_id correlates this push with its response.
message SealJournalKeyToOwnerRequest {
  string spawn_id                  = 1;
  uint64 generation                = 2;
  repeated bytes owner_device_pubkeys = 3;
  string request_id                = 4;
  string owner_id                  = 5; // owner account id — bound into AtRestAAD so the sealed ciphertext is identity-scoped
}

// One sealed journal key in a SealJournalKeyToOwnerResponse.
message SealedJournalKey { string mount = 1; bytes ciphertext = 2; }

// node -> CP: the node has sealed each journaled mount's repo password to the owner's devices.
// error is non-empty on failure (e.g. mount has no node-local password, is ephemeral, etc.).
// The node echoes request_id so the CP can correlate the response.
message SealJournalKeyToOwnerResponse {
  string spawn_id                    = 1;
  string request_id                  = 2;
  repeated SealedJournalKey entries  = 3;
  string error                       = 4; // non-empty on failure
}
