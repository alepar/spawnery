syntax = "proto3";
package node.v1;
option go_package = "spawnery/gen/node/v1;nodev1";

import "auth/v1/auth.proto";

service NodeService {
  // Node dials the CP and holds this stream open. Node sends NodeMessage; CP sends CPMessage.
  rpc Attach(stream NodeMessage) returns (stream CPMessage);
}

// Node-reported runtime phase of a spawn's container. STOPPING/STOPPED = destroy path;
// SUSPENDING/SUSPENDED = suspend path. Values 0-6 are wire-stable; SUSPENDING (7) added for the suspend path.
enum SpawnPhase { SPAWN_PHASE_UNSPECIFIED = 0; STARTING = 1; ACTIVE = 2; STOPPING = 3; STOPPED = 4; ERROR = 5; SUSPENDED = 6; SUSPENDING = 7; }

message NodeMessage {
  oneof msg {
    Register                      register              = 1;
    Heartbeat                     heartbeat             = 2;
    SpawnStatus                   status                = 3;
    Frame                         frame                 = 4;   // agent -> client bytes
    SuspendComplete               suspend_complete      = 5;   // node -> CP: per-mount suspend markers
    SessionRoster                 roster                = 6;   // node -> CP: full live session set for a spawn
    SessionStatus                 session_status        = 7;   // node -> CP: single-session state delta
    SetModelResult                set_model_result      = 8;   // node -> CP: ack/result of a SetModel push
    SealJournalKeyToOwnerResponse seal_journal_key_result = 9; // node -> CP: result of a SealJournalKeyToOwner request (sp-8dkp)
  }
}
message CPMessage {
  oneof msg {
    StartSpawn                   start                 = 1;
    StopSpawn                    stop                  = 2;
    SessionOpen                  open                  = 3;
    SessionClose                 close                 = 4;
    Frame                        frame                 = 5;             // client -> agent bytes
    Suspend                      suspend               = 6;             // CP -> node: persist + tear down
    CreateSession                create_session        = 7;             // CP -> node: launch an additional session (impl: sp-npxq.3)
    CloseSession                 close_session         = 8;             // CP -> node: reap one session
    SetModel                     set_model             = 9;             // CP -> node: switch the running pod's effective model (generation-fenced)
    SecretDelivery               secret_delivery       = 10;            // CP -> node: relay owner-sealed secret ciphertext (sp-2ckv.4)
    SealJournalKeyToOwnerRequest seal_journal_key      = 11;            // CP -> node: seal node-local journal password to owner (sp-8dkp)
  }
}

// One owner-sealed secret in a SecretDelivery: the agent-side target path the unsealed plaintext is
// written to (RELATIVE to the per-spawn secrets tmpfs mount), the HPKE ciphertext sealed to the node's
// sub-key (JSON-encoded seal.NodeSealed — opaque to the CP), and an opaque secret id for logs/dedup.
message SealedSecret { string target_path = 1; bytes sealed = 2; string secret_id = 3; }
// CP -> node: deliver owner-sealed secret ciphertext for a spawn (sp-2ckv.4). generation fences the
// delivery against a superseded pod (node-side staleGen drop) AND binds the in-flight HPKE AAD, so a
// ciphertext sealed for one episode cannot open against another. The CP relays bytes only — it never
// unseals (ciphertext-only relay; the node holds the sub-key private half and unseals).
message SecretDelivery { string spawn_id = 1; uint64 generation = 2; repeated SealedSecret secrets = 3; }

// Per-mount backend binding chosen at create/resume (CP -> node).
message MountBinding { string name = 1; string backend_uri = 2; }
// Per-mount suspend marker reported back after a clean suspend (node -> CP).
message MountMarker  { string name = 1; string marker = 2; }
// Rootfs delta artifact pinned by the CP for migration restore. The artifact is keyed by
// (spawn_id, generation, artifact_id); target restore must use this pinned id, never latest.
message RootfsArtifact {
  string artifact_id = 1;
  uint64 generation = 2;
  int32 sequence = 3;
  string base_image_digest = 4;
  string format = 5;
  string content_digest = 6;
  int64 uncompressed_size = 7;
  string producer_node_id = 8;
  string producer_runtime = 9;
}
// One entry of a node's running-container inventory (node -> CP on Register/Heartbeat).
message RunningSpawn { string spawn_id = 1; uint64 generation = 2; SpawnPhase phase = 3; }

// signed_subkey (field 8): the node's current SignedSubKey (JSON-encoded subkey.SignedSubKey) — its
// cert-signed HPKE encryption sub-key, published so the CP can relay it to owner clients for sealing
// (sp-2ckv.4 §1). Empty when the node has no signing identity (insecure/dev mode publishes no sub-key).
message Register    { string node_id = 1; uint32 max_spawns = 2; repeated string agent_images = 3; repeated RunningSpawn running = 4; string node_class = 5; string node_owner = 6; repeated string binaries = 7; bytes signed_subkey = 8; }
// signed_subkey (field 6): re-published on rotation (the node rotates at half-life) so the CP's cached
// sub-key stays fresh without a dedicated message. Empty on heartbeats that carry no rotation.
message Heartbeat   { uint32 active_spawns = 1; uint32 free_slots = 2; uint32 cpu_pct = 3; uint32 gpu_pct = 4; repeated RunningSpawn running = 5; bytes signed_subkey = 6; }
// base_image_digest (field 5): the content-addressable base-image digest resolved by the node
// at create time (spec §4). Non-empty only when phase=ACTIVE on the initial create, so the CP
// can record it for cross-node resume. Empty on phase transitions that have no new digest.
message SpawnStatus { string spawn_id = 1; SpawnPhase phase = 2; string detail = 3; uint64 generation = 4; string base_image_digest = 5; }
// auth (field 20): the client's signed intent + aud=node access token (A4). The node verifies
// the full chain: AS sig on token -> aud=node -> owner match -> SPKI/cnf match -> intent sig
// -> field-by-field correspondence -> freshness -> jti uniqueness. In verify-and-log mode
// (NODE_AUTH_MODE=insecure) failures are logged but not enforced.
// asserted_owner (field 21): the CP-asserted spawn owner (cloud split model, sp-ova §7a).
// base_image_digest (field 22): pinned base digest for cross-node resume (sp-ei4.1.10);
// empty on fresh create. The node resolves and records the digest at create time; on resume
// the CP threads the stored digest down so the node launches from the exact same base image.
message StartSpawn  {
  string spawn_id    = 1;
  string app_ref     = 2;
  string data_ref    = 3;
  string model       = 4;
  uint64 generation  = 5;
  repeated MountBinding mounts = 6;
  string name        = 7;
  string app_id      = 8;
  string image       = 9;
  string runnable_id = 10;
  string mode        = 11;
  auth.v1.AuthEnvelope auth           = 20;
  string               asserted_owner = 21;
  string               base_image_digest = 22;
  uint64               rootfs_source_generation = 23;
  repeated RootfsArtifact rootfs_artifacts = 24;
}
message StopSpawn   { string spawn_id = 1; uint64 generation = 2; }
message Suspend     { string spawn_id = 1; uint64 generation = 2; bool capture_rootfs_artifact = 3; }
message SuspendComplete {
  string spawn_id = 1;
  uint64 generation = 2;
  repeated MountMarker markers = 3;
  repeated RootfsArtifact rootfs_artifacts = 4;
}
// auth (field 10): the client's session-open signed intent + aud=node access token (A4).
// asserted_owner (field 11): CP-asserted owner for the cloud owner-binding check.
message SessionOpen  {
  string spawn_id   = 1;
  uint64 generation = 2;
  string client_id  = 3;
  int64  cursor     = 4;
  string session_id = 5;
  auth.v1.AuthEnvelope auth           = 10;
  string               asserted_owner = 11;
}
message SessionClose { string spawn_id = 1; uint64 generation = 2; string client_id = 3; string session_id = 4; }
// Frame carries no generation: data frames are correlated to an episode by spawn_id at the session layer.
message Frame        { string spawn_id = 1; bytes data = 2; string client_id = 3; string session_id = 4; }

// Transport decides relay + surface for a session (orthogonal to which runnable runs).
enum SessionTransport {
  SESSION_TRANSPORT_UNSPECIFIED = 0;
  SESSION_TRANSPORT_ACP         = 1;  // node ACP Pump -> web ChatView
  SESSION_TRANSPORT_MOSH        = 2;  // node mosh/tmux PTY relay -> web TerminalView
}
// Per-session lifecycle state the node owns and reports.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_STARTING    = 1;
  SESSION_STATE_ACTIVE      = 2;
  SESSION_STATE_CLOSING     = 3;
  SESSION_STATE_CLOSED      = 4;
  SESSION_STATE_ERROR       = 5;
}
// One session within a spawn. endpoint is an opaque per-transport handle (acp port / tmux session name).
message SessionInfo {
  string session_id          = 1;
  SessionTransport transport = 2;
  string runnable            = 3;
  SessionState state         = 4;
  string endpoint            = 5;
  bool pinned                = 6;   // session #0 is pinned: not closeable
}
// node -> CP: the full live session set for a spawn (sent on any membership change).
message SessionRoster { string spawn_id = 1; uint64 generation = 2; repeated SessionInfo sessions = 3; }
// node -> CP: a single session's state changed (membership unchanged).
message SessionStatus { string spawn_id = 1; string session_id = 2; SessionState state = 3; string detail = 4; }
// CP -> node: launch an additional session. The node allocates the session_id and reports it via SessionRoster.
message CreateSession { string spawn_id = 1; uint64 generation = 2; SessionTransport transport = 3; string runnable = 4; }
// CP -> node: reap one session (by id). Reaping session #0 is rejected node-side (it is pinned).
message CloseSession  { string spawn_id = 1; uint64 generation = 2; string session_id = 3; }
// CP -> node: switch the effective model of the running pod (forwarded to the sidecar override).
// Generation-fenced like StopSpawn/Suspend: the node ignores a SetModel whose generation
// doesn't match the pod it currently holds. request_id correlates this push with its result.
message SetModel       { string spawn_id = 1; uint64 generation = 2; string model = 3; string request_id = 4; }
// node -> CP: result of applying a SetModel. ok=false carries a human reason in detail.
// request_id: the node echoes request_id from the SetModel it handled, so the CP can route the
// result to the exact push that is waiting (a stale ack with no live waiter is dropped).
message SetModelResult { string spawn_id = 1; bool ok = 2; string detail = 3; string request_id = 4; }

// --- W4: node-local -> owner-sealed upgrade seam (sp-8dkp) -------------------

// CP -> node: for each journaled mount of spawn_id, read the node-local repo password and seal it
// to the owner's device set (owner_device_pubkeys are raw X25519 pubkeys). The node responds with
// SealJournalKeyToOwnerResponse carrying the sealed Envelope bytes per mount.
// generation fences this against a superseded pod.
// request_id correlates this push with its response.
message SealJournalKeyToOwnerRequest {
  string spawn_id                  = 1;
  uint64 generation                = 2;
  repeated bytes owner_device_pubkeys = 3;
  string request_id                = 4;
  string owner_id                  = 5; // owner account id — bound into AtRestAAD so the sealed ciphertext is identity-scoped
}

// One sealed journal key in a SealJournalKeyToOwnerResponse.
message SealedJournalKey { string mount = 1; bytes ciphertext = 2; }

// node -> CP: the node has sealed each journaled mount's repo password to the owner's devices.
// error is non-empty on failure (e.g. mount has no node-local password, is ephemeral, etc.).
// The node echoes request_id so the CP can correlate the response.
message SealJournalKeyToOwnerResponse {
  string spawn_id                    = 1;
  string request_id                  = 2;
  repeated SealedJournalKey entries  = 3;
  string error                       = 4; // non-empty on failure
}
