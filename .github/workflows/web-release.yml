# Signed release pipeline for the Spawnery SPA (W1, sp-2ckv.6).
#
# Produces a cosign-keyless-signed dist/ artifact. The deploy step is a STUB
# (no real static host configured) — see deploy/web/README.md for the ops checklist
# to wire up the real host.
#
# Security properties:
#  - [WM20] Builds ONCE with npm ci from the committed lockfile; the tested bundle
#    is the signed bundle is the deployed bundle — same digest flows build→sign→deploy.
#  - [WM21] The gate is falsifiable: every release asserts verify FAILS for a
#    signature-stripped artifact and a wrong-identity fixture.
#  - [WL2] Anti-rollback: deploy job enforces a monotonic release counter.
#  - [WL3] Pre-sign forbidden-value scan: localhost origins, unsafe-eval/unsafe-inline
#    (except the documented xterm/sonner exception), dev-token, PLACEHOLDER anchors.
#  - [WM17] Sequencing gate: public DNS flip is gated on per-account auth (see README).
#    This pipeline deploys to a private/staging origin until then.
#
# Residuals (stated honestly [WM20]):
#  - The static host, the CI signing path, and the npm dependency tree at build time
#    are trusted. A compromised transitive dep produces a signed, CSP-clean bundle.
#  - Lockfile discipline + SLSA attestation (deferred follow-up) reduce but do not
#    eliminate supply-chain risk.

name: web-release

on:
  push:
    tags:
      - "web/v[0-9]*"

permissions:
  contents: read
  id-token: write  # Required for cosign keyless OIDC signing.

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    outputs:
      dist-digest: ${{ steps.digest.outputs.digest }}
      release-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      # [WM20]: NEVER npm install — always npm ci from the committed lockfile.
      - name: Install dependencies (npm ci from lockfile)
        run: npm ci

      # Build with pinned origins from the release environment.
      # VITE_CP_ORIGIN and VITE_AS_ORIGIN are set in the GitHub Environment secrets.
      # VITE_AUTH_TOKEN is the bearer token baked into the bundle; the literal "dev-token"
      # must NOT appear in signed bundles (pre-sign scan rejects it — see [WL3]).
      # Set VITE_AUTH_TOKEN in the release GitHub Environment until real per-account auth lands.
      - name: Build (production, pinned origins)
        env:
          VITE_CP_ORIGIN: ${{ vars.VITE_CP_ORIGIN }}
          VITE_AS_ORIGIN: ${{ vars.VITE_AS_ORIGIN }}
          VITE_AUTH_TOKEN: ${{ secrets.VITE_AUTH_TOKEN }}
        run: npm run build

      # [WM20]: Run the full test suite against the BUILT artifact so the same bundle
      # that flows into sign/deploy is the one the tests ran on (not just source).
      - name: Vitest (unit tests on built artifact)
        run: npm test

      # CSP Playwright suite — exercises the prod bundle under enforced CSP.
      # A dep that regresses to eval/inline fails here before signing.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: CSP Playwright suite (prod bundle, enforced CSP)
        run: npm run test:e2e:csp

      # [WL3]: Pre-sign forbidden-value scan — must pass before signing.
      - name: Pre-sign forbidden-value scan
        run: |
          cd ..
          deploy/web/forbidden-scan.sh web/dist

      - name: Compute dist digest
        id: digest
        run: |
          DIGEST=$(tar -cf - dist/ | sha256sum | cut -d' ' -f1)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "dist digest: $DIGEST"

      - name: Extract release version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#web/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release version: $VERSION"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.digest.outputs.digest }}
          path: web/dist/
          if-no-files-found: error

  # ── Sign ───────────────────────────────────────────────────────────────────
  sign:
    name: Sign
    needs: build
    runs-on: ubuntu-latest
    environment: release
    outputs:
      bundle-name: ${{ steps.sign.outputs.bundle-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact (same digest as tested)
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.build.outputs.dist-digest }}
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # [WM20]: tar+gzip is non-deterministic across runs (mtimes, gzip header).
      # We sign exactly THIS archive and upload it so the deploy job verifies the
      # SAME bytes — never recreate the archive independently.
      - name: Create dist archive for signing
        run: tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner -czf dist.tar.gz dist/

      # Cosign keyless signing via GitHub Actions OIDC — no long-lived keys.
      - name: Sign dist archive
        id: sign
        run: |
          cosign sign-blob --yes dist.tar.gz --bundle dist.tar.gz.bundle
          echo "bundle-name=dist.tar.gz.bundle" >> "$GITHUB_OUTPUT"
          echo "Signed: $(cat dist.tar.gz.bundle | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"rekorBundle\", {}).get(\"SignedEntryTimestamp\", \"(no timestamp)\")[:30])')"

      - name: Upload signature bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-sig-${{ needs.build.outputs.dist-digest }}
          path: dist.tar.gz.bundle

      # Upload the EXACT archive that was signed so the deploy job can verify
      # byte-for-byte without recreating (non-deterministic recreation would break cosign verify).
      - name: Upload signed archive
        uses: actions/upload-artifact@v4
        with:
          name: web-archive-${{ needs.build.outputs.dist-digest }}
          path: dist.tar.gz

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (stub)
    needs: [build, sign]
    runs-on: ubuntu-latest
    # Scoped deploy environment — separate from CI build env, own credentials.
    environment: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.build.outputs.dist-digest }}
          path: dist/

      - name: Download signature bundle
        uses: actions/download-artifact@v4
        with:
          name: web-sig-${{ needs.build.outputs.dist-digest }}
          path: ./

      # Download the EXACT archive that was signed — do NOT recreate it.
      # tar+gzip is non-deterministic (mtime-sensitive); only the original bytes match
      # the cosign signature ([WM20] same-digest build→sign→deploy).
      - name: Download signed archive
        uses: actions/download-artifact@v4
        with:
          name: web-archive-${{ needs.build.outputs.dist-digest }}
          path: ./

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # [WM21]: Verify with EXACT identity pinning — no regexp flags.
      - name: Verify signature before deploy
        env:
          COSIGN_CERT_IDENTITY: "https://github.com/${{ github.repository }}/.github/workflows/web-release.yml@${{ github.ref }}"
          COSIGN_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
        run: |
          cosign verify-blob \
            --certificate-identity "$COSIGN_CERT_IDENTITY" \
            --certificate-oidc-issuer "$COSIGN_OIDC_ISSUER" \
            --bundle dist.tar.gz.bundle \
            dist.tar.gz
          echo "Signature VERIFIED. Proceeding to deploy."

      # [WM21] Falsifiable self-test: assert verify FAILS for bad cases.
      - name: "Self-test: verify MUST fail on signature-stripped artifact"
        run: |
          # Use /dev/null as the bundle — no signature exists for this file.
          if cosign verify-blob \
               --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/web-release.yml@${{ github.ref }}" \
               --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
               --bundle /dev/null \
               deploy/web/fixtures/stripped-artifact.txt 2>/dev/null; then
            echo "FATAL: verify passed on stripped artifact — gate is broken" >&2
            exit 1
          fi
          echo "Self-test PASSED: verify correctly rejected stripped artifact."

      - name: "Self-test: verify MUST fail with wrong OIDC issuer"
        run: |
          # Use a wrong OIDC issuer — should be rejected.
          if cosign verify-blob \
               --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/web-release.yml@${{ github.ref }}" \
               --certificate-oidc-issuer "https://evil.example.invalid" \
               --bundle dist.tar.gz.bundle \
               dist.tar.gz 2>/dev/null; then
            echo "FATAL: verify passed with wrong OIDC issuer — gate is broken" >&2
            exit 1
          fi
          echo "Self-test PASSED: verify correctly rejected wrong OIDC issuer."

      # [WM21] Wrong-identity self-test: verify MUST fail when the bundle was signed by a
      # DIFFERENT workflow identity (attacker-fork scenario). The fixture is signed by
      # deploy/web/gen-test-fixture.yml (a different certificate identity than web-release.yml).
      # Run `gh workflow run gen-test-fixture.yml` once to generate deploy/web/fixtures/wrong-identity.bundle.
      # If the fixture is absent the step FAILS (exit 1) — the gate must be falsifiable before
      # the first release. See deploy/web/fixtures/README.md.
      - name: "Self-test: verify MUST fail with wrong workflow identity"
        run: |
          FIXTURE="deploy/web/fixtures/wrong-identity.bundle"
          if [ ! -f "$FIXTURE" ]; then
            echo "FATAL: deploy/web/fixtures/wrong-identity.bundle is missing." >&2
            echo "The certificate-identity pin cannot be verified as falsifiable without this fixture." >&2
            echo "Run 'gh workflow run gen-test-fixture.yml' once to generate it, then commit the result." >&2
            exit 1
          fi
          # Verify with OUR identity against the WRONG-IDENTITY bundle — must fail because the
          # cert in the bundle was issued to a different workflow, not web-release.yml.
          if cosign verify-blob \
               --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/web-release.yml@${{ github.ref }}" \
               --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
               --bundle "$FIXTURE" \
               deploy/web/fixtures/stripped-artifact.txt 2>/dev/null; then
            echo "FATAL: verify passed with wrong-identity bundle — gate is broken" >&2
            exit 1
          fi
          echo "Self-test PASSED: verify correctly rejected wrong-identity bundle."

      # [WL2]: Anti-rollback — enforce monotonic release counter.
      - name: Anti-rollback check (monotonic release counter)
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release-version }}
        run: |
          PREV=$(cat deploy/web/release-counter.txt | tr -d '[:space:]')
          # Extract the numeric part from the tag (web/vN -> N).
          CURR_NUM="${RELEASE_VERSION#v}"  # strip leading 'v'
          echo "Previous counter: $PREV, Current: $CURR_NUM"
          # Pass values via env vars — never interpolate tag-derived strings into Python source.
          if ! ANTI_ROLLBACK_PREV="$PREV" ANTI_ROLLBACK_CURR="$CURR_NUM" python3 - <<'PYEOF'
          import sys, os
          prev_raw = os.environ.get('ANTI_ROLLBACK_PREV') or '0'
          curr = os.environ['ANTI_ROLLBACK_CURR']
          # Compare as integer tuples to support semver tags (web/v1.1.0 > web/v1.0.0).
          # Non-numeric components are treated as 0 so alpha/rc suffixes don't silently pass.
          def to_tuple(s):
              return [int(x) if x.isdigit() else 0 for x in s.split('.')]
          prev_t = to_tuple(prev_raw)
          curr_t = to_tuple(curr)
          length = max(len(prev_t), len(curr_t))
          prev_t += [0] * (length - len(prev_t))
          curr_t += [0] * (length - len(curr_t))
          if curr_t <= prev_t:
              print(f'ANTI-ROLLBACK FAIL: {curr} <= previous {prev_raw}', file=sys.stderr)
              sys.exit(1)
          print(f'Anti-rollback OK: {curr} > {prev_raw}')
          PYEOF
          then
            exit 1
          fi

      # DEPLOY STUB: no real static host configured yet.
      # See deploy/web/README.md for the ops checklist to wire up the real host.
      # The [WM17] sequencing gate means this MUST remain a private/staging origin
      # until minimal per-account auth (invite tokens) is in place.
      - name: "Deploy (STUB — no real host configured)"
        run: |
          echo "============================================================"
          echo "DEPLOY STUB: dist/ is signed and verified."
          echo "Release: ${{ needs.build.outputs.release-version }}"
          echo "Digest:  ${{ needs.build.outputs.dist-digest }}"
          echo ""
          echo "To complete deployment, follow deploy/web/README.md:"
          echo "  1. Configure the static host (Cloudflare Pages / Netlify class)"
          echo "  2. Set DEPLOY_TOKEN in the 'deploy' GitHub Environment"
          echo "  3. Replace this stub with the real upload command"
          echo "  4. Update deploy/web/release-counter.txt after successful deploy"
          echo ""
          echo "[WM17] Sequencing gate: public DNS flip is gated on per-account auth."
          echo "============================================================"
